                        </form>
                    </div>
                </div>
            `);
            document.getElementById('tariffForm').onsubmit = (e) => {
                e.preventDefault();
                const list = getTariffs();
                list.push({
                    id: 't' + Date.now(),
                    code: document.getElementById('tCode').value.trim().toUpperCase(),
                    label: document.getElementById('tLabel').value.trim(),
                    category: document.getElementById('tCat').value,
                    price_usd: parseFloat(document.getElementById('tPrice').value) || 0
                });
                saveTariffs(list);
                showToast('Tarif ajouté', 'success');
                closeModal('tariffModal');
                loadTariffsPage();
            };
        }

        function editTariff(id) {
            const list = getTariffs();
            const t = list.find(x => x.id === id);
            if (!t) return;
            document.body.insertAdjacentHTML('beforeend', `
                <div class="modal active" id="editTariffModal">
                    <div class="modal-content" style="max-width:500px;">
                        <div class="modal-header"><h3><i class="fas fa-edit"></i> Modifier tarif</h3><span class="close-modal" onclick="closeModal('editTariffModal')">&times;</span></div>
                        <form id="editTariffForm">
                            <div class="form-group"><label class="form-label">Code</label><input class="form-control" id="eCode" value="${escapeHtml(t.code)}" required></div>
                            <div class="form-group"><label class="form-label">Libellé</label><input class="form-control" id="eLabel" value="${escapeHtml(t.label)}" required></div>
                            <div class="form-group"><label class="form-label">Catégorie</label>
                                <select class="form-control" id="eCat">
                                    ${['Consultation','Laboratoire','Hospitalisation','Soins','Pharmacie','Autre'].map(c => `<option ${t.category===c?'selected':''}>${c}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group"><label class="form-label">Prix (USD)</label><input type="number" step="0.01" class="form-control" id="ePrice" value="${t.price_usd}" required></div>
                            <button type="submit" class="btn btn-primary btn-full">Enregistrer</button>
                        </form>
                    </div>
                </div>
            `);
            document.getElementById('editTariffForm').onsubmit = (e) => {
                e.preventDefault();
                const newList = getTariffs().map(item => {
                    if (item.id === id) {
                        return {
                            ...item,
                            code: document.getElementById('eCode').value.trim().toUpperCase(),
                            label: document.getElementById('eLabel').value.trim(),
                            category: document.getElementById('eCat').value,
                            price_usd: parseFloat(document.getElementById('ePrice').value) || 0
                        };
                    }
                    return item;
                });
                saveTariffs(newList);
                showToast('Tarif modifié', 'success');
                closeModal('editTariffModal');
                loadTariffsPage();
            };
        }

        function deleteTariff(id) {
            if (!confirm('Supprimer ce tarif ?')) return;
            const list = getTariffs().filter(t => t.id !== id);
            saveTariffs(list);
            showToast('Tarif supprimé', 'success');
            loadTariffsPage();
        }

                    <ul style="line-height:1.9;font-size:14px">
                        <li>Consultation 10$ = ${(10 * rate).toLocaleString('fr-FR')} FC</li>
                        <li>Hospitalisation 20$/jour = ${(20 * rate).toLocaleString('fr-FR')} FC</li>
                        <li>Examen 10$ = ${(10 * rate).toLocaleString('fr-FR')} FC</li>
                    </ul>
                </div>
            `;
        }

        function saveRate() {
            const v = parseFloat(document.getElementById('rateInput').value);
            if (!v || v <= 0) return showToast('Taux invalide', 'error');
            setRate(v);
            showToast(`Taux du jour : 1$ = ${v.toLocaleString('fr-FR')} FC`, 'success');
            loadRatePage();
        }

        // ==================== HELPERS FOR PATIENTS ====================
        async function getPatientsOptions(forceRefresh = false, context = '') {
            if (!context && !forceRefresh && patientsCache.length) return patientsCache;
            const endpoint = context ? `/patients?context=${encodeURIComponent(context)}` : '/patients';
            const allPatients = sortByDateDesc(await api.get(endpoint), 'created_at');
            const filteredPatients = context ? allPatients : await filterPatientsForCurrentRole(allPatients);
            if (!context) patientsCache = filteredPatients;
            return filteredPatients;
        }

        // ==================== ENHANCEMENTS ====================
        function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) return;
            navigator.serviceWorker.register('sw.js').catch(error => console.warn('Service Worker non active:', error));
        }

        function initializeIHubEnhancements() {
            registerServiceWorker();
        }

        // ==================== LOGOUT ====================
        async function logout() {
            try {
                await fetch(`${CONFIG.API_URL}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (error) {}
            SecureStorage.clear();
            currentUser = null;
            window.location.href = 'index.html';
        }
