    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            API_URL: 'https://odimba-1.onrender.com/api',
            AI_API_URL: 'https://odimba-1.onrender.com/api/ai',
            APP_NAME: 'I-Hub',
            APP_VERSION: '1.0.0',

            HOSPITAL_PHONE: '+243 974 336 700',
            HOSPITAL_EMAIL: 'jeremyodimba322@gmail.com',
            HOSPITAL_ADDRESS: '',
            HOSPITAL_LOGO_URL: 'logo.jpg',
            CURRENCY: 'Fc',
            ITEMS_PER_PAGE: 20,
            DEBUG: false
        };

        // ==================== STORAGE ====================
        class SecureStorage {
            static set(key, value, persistent = false) {
                try {
                    const target = persistent ? localStorage : sessionStorage;
                    const secondary = persistent ? sessionStorage : localStorage;
                    target.setItem(key, JSON.stringify(value));
                    secondary.removeItem(key);
                } catch(e) { console.error('Storage error:', e); }
            }
            static get(key) {
                try {
                    const sessionItem = sessionStorage.getItem(key);
                    if (sessionItem !== null) return JSON.parse(sessionItem);
                    const localItem = localStorage.getItem(key);
                    return localItem ? JSON.parse(localItem) : null;
                } catch(e) { return null; }
            }
            static remove(key) {
                sessionStorage.removeItem(key);
                localStorage.removeItem(key);
            }
            static clear() {
                sessionStorage.clear();
                localStorage.clear();
            }
        }

        // ==================== API SERVICE ====================
        class APIService {
            constructor(baseURL) { this.baseURL = baseURL; }

            async request(endpoint, options = {}, retries = 1) {
                const token = SecureStorage.get('token');
                const headers = { ...options.headers };
                if (!(options.body instanceof FormData) && !headers['Content-Type']) {
                    headers['Content-Type'] = 'application/json';
                }
                if (token) headers['Authorization'] = `Bearer ${token}`;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);

                    const response = await fetch(`${this.baseURL}${endpoint}`, {
                        ...options,
                        headers,
                        credentials: 'include',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.status === 401) { this.logout(); throw new Error('Session expirée. Veuillez vous reconnecter.'); }
                    if (response.status === 403) throw new Error('Accès interdit. Permissions insuffisantes.');
                    if (response.status === 404) throw new Error('Ressource introuvable.');
                    if (response.status === 422) { const data = await response.json(); throw new Error(data.error || 'Données invalides.'); }
                    if (response.status === 429) throw new Error('Trop de requêtes. Veuillez patienter.');
                    if (response.status >= 500) {
                        if (retries > 0) {
                            await new Promise(r => setTimeout(r, 1000));
                            return this.request(endpoint, options, retries - 1);
                        }
                        throw new Error('Erreur serveur. Réessayez plus tard.');
                    }

                    const responseType = response.headers.get('content-type') || '';
                    let data = null;
                    if (response.status !== 204 && response.status !== 205) {
                        if (responseType.includes('application/json')) {
                            data = await response.json();
                        } else {
                            const text = await response.text();
                            data = text ? { message: text } : null;
                        }
                    }
                    if (!response.ok) throw new Error(data?.error || data?.message || 'Erreur inconnue');
                    return data;
                } catch(error) {
                    if (error.name === 'AbortError') throw new Error('Requête expirée. Vérifiez votre connexion.');
                    if (error.message === 'Failed to fetch') throw new Error('Serveur indisponible. Vérifiez que le backend est démarré.');
                    throw error;
                }
            }
            get(endpoint) { return this.request(endpoint, { method: 'GET' }); }
            post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); }
            put(endpoint, body) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(body) }); }
            patch(endpoint, body) { return this.request(endpoint, { method: 'PATCH', body: JSON.stringify(body) }); }
            delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); }
            logout() { SecureStorage.clear(); window.location.href = 'index.html'; }
        }

        let api = null;
        let currentUser = null;
        let billingCache = [];
        let pharmacyStockCache = [];
        let dashboardCharts = [];
        let patientSearchTimer = null;
        let patientsCache = [];
        let appointmentsCache = [];
        let pharmacyCart = [];
        let smartAlertsInitialized = false;
        let pregnanciesCache = [];
        let prenatalCache = [];

        // ==================== HELPERS ====================
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function sanitizeInput(input) {
            if (input === null || input === undefined) return '';
            return String(input)
                .replace(/[\u0000-\u001F\u007F]/g, ' ')
                .replace(/[<>`]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function safeText(value, fallback = '—') {
            return value === null || value === undefined || value === '' ? fallback : String(value);
        }

        function normalizeEmail(value) {
            return sanitizeInput(value).toLowerCase();
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalizeEmail(value));
        }

        function parseIntegerInput(value, fallback = NaN) {
            const parsed = Number.parseInt(String(value), 10);
            return Number.isInteger(parsed) ? parsed : fallback;
        }

        function parseAmountInput(value, fallback = NaN) {
            const normalized = String(value ?? '').replace(',', '.').trim();
            const parsed = Number.parseFloat(normalized);
            return Number.isFinite(parsed) ? parsed : fallback;
        }

        function roundMoney(value) {
            return Math.round((Number(value) || 0) * 100) / 100;
        }

        function assert(condition, message) {
            if (!condition) throw new Error(message);
        }

        function formatDate(value, locale = 'fr-FR') {
            if (!value) return '—';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '—' : date.toLocaleDateString(locale);
        }

        function formatDateTime(value, locale = 'fr-FR') {
            if (!value) return '—';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '—' : date.toLocaleString(locale);
        }

        function getGreetingMessage(date = new Date()) {
            const hour = date.getHours();
            if (hour < 12) return 'Bonjour';
            if (hour < 18) return 'Bon après-midi';
            return 'Bonsoir';
        }

        function formatShortTime(date = new Date(), locale = 'fr-FR') {
            return date.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
        }

        function formatMoney(value) {
            const amount = Number(value || 0);
            const currency = String(CONFIG.CURRENCY || 'Fc').replace(/[^p{L}p{N}.$€£¥-]/gu, '') || 'Fc';
            const formatted = amount.toLocaleString('fr-FR', {
                minimumFractionDigits: Number.isInteger(amount) ? 0 : 2,
                maximumFractionDigits: 2
            }).replace(/[\u202F\u00A0]/g, ' ');
            return `${formatted} ${currency}`;
        }

        function sortByDateDesc(items, key) {
            return [...(items || [])].sort((a, b) => {
                const left = new Date(a?.[key] || a?.created_at || 0).getTime();
                const right = new Date(b?.[key] || b?.created_at || 0).getTime();
                return right - left;
            });
        }

        function getPatientStatusLabel(status) {
            const labels = { active: 'Actif', admitted: 'Hospitalisé', discharged: 'Sorti' };
            return labels[status] || safeText(status, 'Actif');
        }

        function getPatientStatusBadgeClass(status) {
            if (status === 'admitted') return 'warning';
            if (status === 'discharged') return 'info';
            return 'success';
        }

        function getInvoiceStatusLabel(status) {
            return status === 'paid' ? 'Payée' : 'Impayée';
        }

        function getInvoiceStatusClass(status) {
            return status === 'paid' ? 'success' : 'danger';
        }

        function getGenderLabel(gender) {
            const labels = { M: 'Masculin', F: 'Féminin' };
            return labels[gender] || safeText(gender, 'Non renseigné');
        }

        function getRoleLabel(role) {
            const roles = {
                'super_admin': 'Administrateur',
                'docteur': 'Médecin',
                'infirmier': 'Infirmière',
                'laboratoire': 'Laboratoire',
                'pharmacie': 'Pharmacie',
                'reception': 'Réception'
            };
            return roles[role] || role;
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.remove();
        }

        function closeSidebar() {
            document.getElementById('sidebar')?.classList.remove('mobile-open');
            document.getElementById('sidebarOverlay')?.classList.remove('active');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (!sidebar || !overlay) return;
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active', sidebar.classList.contains('mobile-open'));
        }

        function syncResponsiveChrome() {
            const menuButton = document.getElementById('mobileMenuBtn');
            if (!menuButton) return;
            menuButton.style.display = currentUser && window.innerWidth <= 768 ? 'flex' : 'none';
            if (window.innerWidth > 768) closeSidebar();
        }

        function beginFormSubmission(form, pendingLabel = 'Traitement...') {
            if (!form) return true;
            if (form.dataset.submitting === 'true') return false;
            form.dataset.submitting = 'true';
            const submitButton = form.querySelector('button[type="submit"]');
            if (submitButton) {
                submitButton.dataset.originalLabel = submitButton.innerHTML;
                submitButton.disabled = true;
                submitButton.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${escapeHtml(pendingLabel)}`;
            }
            return true;
        }

        function endFormSubmission(form) {
            if (!form) return;
            delete form.dataset.submitting;
            const submitButton = form.querySelector('button[type="submit"]');
            if (submitButton) {
                submitButton.disabled = false;
                submitButton.innerHTML = submitButton.dataset.originalLabel || submitButton.innerHTML;
                delete submitButton.dataset.originalLabel;
            }
        }

        function normalizeInvoiceRecord(data) {
            if (!data) return null;
            if (Array.isArray(data)) return normalizeInvoiceRecord(data[0]);
            if (data.invoice) return normalizeInvoiceRecord(data.invoice);
            if (data.data) return normalizeInvoiceRecord(data.data);
            return data.id ? data : null;
        }

        function getCurrentRole() {
            return currentUser?.role || '';
        }

        function isAdmin() {
            return getCurrentRole() === 'super_admin';
        }

        function canAccessPage(pageId) {
            if (isAdmin()) return true;
            return (ROLE_PAGE_ACCESS[getCurrentRole()] || []).includes(pageId);
        }

        function canSeeFinance() {
            return isAdmin() || getCurrentRole() === 'reception';
        }

        function canSeePharmacy() {
            return isAdmin() || getCurrentRole() === 'pharmacie';
        }

        function canCreatePatients() {
            return isAdmin() || getCurrentRole() === 'reception';
        }

        function canCreatePrescriptions() {
            return isAdmin() || getCurrentRole() === 'docteur';
        }

        function canManageLabResults() {
            return isAdmin() || getCurrentRole() === 'laboratoire';
        }

        function getPatientAgeYears(patient) {
            const rawDate = patient?.date_of_birth || patient?.birth_date || patient?.dob;
            if (!rawDate) return null;
            const birthDate = new Date(rawDate);
            if (Number.isNaN(birthDate.getTime())) return null;
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        function isFemalePatient(patient) {
            return ['f', 'female', 'feminin', 'feminin', 'femme'].includes(String(patient?.gender || '').toLowerCase());
        }

        function isOwnRecord(rec) {
            const myId = String(currentUser?.id || '');
            const myName = String(currentUser?.name || '').toLowerCase();
            if (!myId && !myName) return true;
            const idFields = ['assigned_doctor_id','doctor_id','practitioner_id','provider_id','prescriber_id','requested_by','created_by','user_id','assigned_to'];
            if (myId && idFields.some(f => String(rec?.[f] || '') === myId)) return true;
            const nameFields = ['doctor_name','practitioner_name','provider_name','prescriber_name','created_by_name','user_name','assigned_doctor_name'];
            if (myName && nameFields.some(f => String(rec?.[f] || '').toLowerCase() === myName)) return true;
            return false;
        }

        function filterForCurrentDoctor(list) {
            if (getCurrentRole() !== 'docteur') return list;
            return (Array.isArray(list) ? list : []).filter(isOwnRecord);
        }

        function filterPatientsForCurrentRole(patients) {
            const list = Array.isArray(patients) ? patients : [];
            if (getCurrentRole() === 'docteur') return list.filter(isOwnRecord);
            return list;
        }

        function isOwnAppointment(appointment) {
            if (getCurrentRole() !== 'docteur') return true;
            return isOwnRecord(appointment);
        }

        function filterAppointmentsForCurrentRole(appointments) {
            const list = Array.isArray(appointments) ? appointments : [];
            return list.filter(isOwnAppointment);
        }

        function patientInitials(name) {
            const parts = String(name || 'Patient').trim().split(/\s+/).filter(Boolean);
            return parts.slice(0, 2).map(part => part[0]?.toUpperCase() || '').join('') || 'IH';
        }

        function getRiskBadge(risk) {
            const config = {
                normal: { class: 'success', text: 'Normal' },
                moderate: { class: 'warning', text: '⚠️ Modéré' },
                high: { class: 'danger', text: '🔴 Élevé' }
            };
            const c = config[risk] || config.normal;
            return `<span class="badge badge-${c.class}">${c.text}</span>`;
        }

        function getPregnancyStatusBadge(status) {
            const config = {
                active: { class: 'success', text: 'Active' },
                completed: { class: 'info', text: 'Terminée' },
                terminated: { class: 'danger', text: 'Interrompue' }
            };
            const c = config[status] || config.active;
            return `<span class="badge badge-${c.class}">${c.text}</span>`;
        }

        function calculateGestationalAge(lmp) {
            if (!lmp) return '—';
            const lmpDate = new Date(lmp);
            const today = new Date();
            const diffDays = Math.floor((today - lmpDate) / (1000 * 60 * 60 * 24));
            const weeks = Math.floor(diffDays / 7);
            const days = diffDays % 7;
            return `${weeks}+${days}`;
        }

        function calculateAge(birthDate) {
            if (!birthDate) return '—';
            const birth = new Date(birthDate);
            const today = new Date();
            let years = today.getFullYear() - birth.getFullYear();
            let months = today.getMonth() - birth.getMonth();
            let days = today.getDate() - birth.getDate();

            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            if (years > 0) return `${years} an${years > 1 ? 's' : ''}`;
            if (months > 0) return `${months} mois`;
            return `${days} jour${days > 1 ? 's' : ''}`;
        }

        function truncateText(text, maxLength) {
            if (!text) return '—';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        function getAuditBadgeClass(action) {
            const badges = {
                'create': 'success', 'CREATE': 'success',
                'update': 'warning', 'UPDATE': 'warning', 'edit': 'warning',
                'delete': 'danger', 'DELETE': 'danger',
                'login': 'primary', 'logout': 'secondary'
            };
            return badges[action] || 'info';
        }

        function getAuditActionLabel(action) {

                'delete': 'Suppression', 'DELETE': 'Suppression',
                'login': 'Connexion', 'logout': 'Déconnexion'

            return labels[action] || action;
        }

        // ==================== PAGE LOADER ====================
        async function loadPage(pageId, event) {
            const mainContent = document.getElementById('mainContent');
            if (!canAccessPage(pageId)) {
                mainContent.innerHTML = `
                    <div class="empty-state" style="margin-top:40px;">
                        <i class="fas fa-user-lock" style="font-size:48px;color:var(--warning);margin-bottom:16px;"></i>
                        <h3 style="margin-bottom:10px;">Accès limité</h3>
                        <p>Cette section n'est pas disponible pour votre rôle actuel.</p>
                        <p style="margin-top:12px;"><span class="badge badge-info"><i class="fas fa-user-tag"></i> ${escapeHtml(getRoleLabel(currentUser?.role))}</span></p>
                    </div>
                `;
                return;
            }

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const activeItem = event?.target?.closest('.nav-item') || document.querySelector(`.nav-item[data-page="${pageId}"]`);
            activeItem?.classList.add('active');

            showLoading();
            try {
                switch (pageId) {
                    case 'dashboard': await loadDashboardStats(); break;
                    case 'patients': await loadPatients(); break;
                    case 'appointments': await loadAppointments(); break;
                    case 'prescriptions': await loadPrescriptions(); break;
                    case 'laboratory': await loadLaboratoryTests(); break;
                    case 'lab-results': await loadLabResults(); break;
                    case 'care': await loadCareLogs(); break;
                    case 'pharmacy': await loadPharmacyStock(); break;
                    case 'billing': await loadInvoices(); break;
                    case 'users': await loadUsers(); break;
                    case 'audit': await loadAuditLogs(); break;
                    case 'reports': await loadReports(); break;
                    case 'ai-assistant': await loadAIAssistantPage(); break;
                    case 'pregnancies': await loadPregnanciesPage(); break;
                    case 'prenatal': await loadPrenatalPage(); break;
                    case 'deliveries': await loadDeliveriesPage(); break;
                    case 'children': await loadChildrenPage(); break;
                    case 'vaccinations': await loadVaccinationsPage(); break;
                    case 'growth': await loadGrowthPage(); break;
                    case 'maternity-rooms': await loadMaternityRoomsPage(); break;
                    case 'wf-queue': await loadQueuePage(); break;
                    case 'wf-dispatch': await loadDispatchPage(); break;
                    case 'wf-vitals': await loadVitalsPage(); break;
                    case 'wf-hospitalization': await loadHospitalizationPage(); break;
                    case 'wf-daily-care': await loadDailyCarePage(); break;
                    case 'wf-med-admin': await loadMedAdminPage(); break;
                    case 'wf-medical-record': await loadMedicalRecordPage(); break;
                    case 'wf-account': await loadPatientAccountPage(); break;
                    case 'wf-final-invoice': await loadFinalInvoicePage(); break;
                    case 'tariffs': await loadTariffsPage(); break;
                    case 'rates': await loadRatePage(); break;
                    default: mainContent.innerHTML = `<div class="empty-state"><h3>Page en construction</h3></div>`;
                }
            } catch (error) {
                showToast(error.message, 'error');
                mainContent.innerHTML = `
                    <div class="empty-state" style="margin-top:40px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:40px;color:var(--warning);margin-bottom:10px;"></i>
                        <h3 style="margin-bottom:10px;">Erreur de chargement</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn btn-primary" onclick="loadPage('${pageId}')" style="margin-top:18px;"><i class="fas fa-sync-alt"></i> Réessayer</button>
                    </div>
                `;
            } finally {
                hideLoading();
                closeSidebar();
            }
        }

        function loadDashboard() {
            const savedToken = SecureStorage.get('token');
            const savedUser = SecureStorage.get('user');
            if (savedToken && savedUser) currentUser = savedUser;
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userInfo').innerHTML = `<strong>${escapeHtml(currentUser.name)}</strong><br><small>${escapeHtml(getRoleLabel(currentUser.role))}</small>`;
            buildNavigation();
            syncResponsiveChrome();
            loadPage('dashboard');
            initializeIHubEnhancements();
        }

        // ==================== DASHBOARD STATS ====================
        async function loadDashboardStats() {
            const viewAppointments = canAccessPage('appointments');
            const viewPrescriptions = canAccessPage('prescriptions');
            const viewLaboratory = canAccessPage('laboratory') || canAccessPage('lab-results');
            const viewPharmacy = canSeePharmacy();
            const viewFinance = canSeeFinance();

            const fetches = [
                api.get('/patients'),
                viewAppointments ? api.get('/appointments') : Promise.resolve([]),
                viewPrescriptions ? api.get('/prescriptions') : Promise.resolve([]),
                viewLaboratory ? api.get('/laboratory/tests') : Promise.resolve([]),
                viewPharmacy ? api.get('/pharmacy') : Promise.resolve([]),
                viewFinance ? api.get('/billing') : Promise.resolve([])
            ];

            const [patients, rawAppointments, prescriptions, labTests, pharmacy, invoices] = await Promise.all(fetches);
            const appointments = filterAppointmentsForCurrentRole(rawAppointments);

            billingCache = viewFinance ? invoices : [];
            patientsCache = sortByDateDesc(patients, 'created_at');
            appointmentsCache = sortByDateDesc(appointments, 'date');
            const sortedInvoices = sortByDateDesc(invoices, 'created_at');

            const pendingTests = viewLaboratory ? labTests.filter(test => test.status === 'pending').length : 0;
            const completedTests = viewLaboratory ? labTests.filter(test => test.status === 'completed').length : 0;
            const unpaidInvoices = viewFinance ? invoices.filter(invoice => invoice.status !== 'paid').length : 0;
            const totalRevenue = viewFinance ? invoices.reduce((sum, invoice) => sum + Number(invoice.amount || 0), 0) : 0;
            const paidRevenue = viewFinance ? invoices.filter(invoice => invoice.status === 'paid').reduce((sum, invoice) => sum + Number(invoice.amount || 0), 0) : 0;
            const paymentRate = totalRevenue ? Math.round((paidRevenue / totalRevenue) * 100) : 0;
            const lowStockCount = viewPharmacy ? pharmacy.filter(item => item.quantity <= item.threshold).length : 0;

            const stats = [{ icon: 'fa-users', value: patients.length, label: 'Patients' }];
            if (viewAppointments) stats.push({ icon: 'fa-calendar-alt', value: appointments.length, label: 'Rendez-vous' });
            if (viewPrescriptions) stats.push({ icon: 'fa-prescription-bottle', value: prescriptions.length, label: 'Prescriptions' });
            if (viewLaboratory) {
                stats.push({ icon: 'fa-flask', value: pendingTests, label: 'Analyses en attente' });
                stats.push({ icon: 'fa-microscope', value: completedTests, label: 'Analyses terminées' });
            }
            if (viewPharmacy) stats.push({ icon: 'fa-pills', value: lowStockCount, label: 'Stocks sous seuil' });
            if (viewFinance) stats.push({ icon: 'fa-file-invoice-dollar', value: unpaidInvoices, label: 'Factures impayées' });

            const patientStatusCounts = { Actifs: 0, Hospitalises: 0, Sortis: 0 };
            patients.forEach(patient => {
                if (patient.status === 'admitted') patientStatusCounts.Hospitalises++;
                else if (patient.status === 'discharged') patientStatusCounts.Sortis++;
                else patientStatusCounts.Actifs++;
            });

            const startOfWeek = new Date();
            startOfWeek.setHours(0, 0, 0, 0);
            startOfWeek.setDate(startOfWeek.getDate() - ((startOfWeek.getDay() + 6) % 7));
            const appointmentsPerDay = { labels: [], values: [] };
            const appointmentMap = {};
            for (let index = 0; index < 7; index++) {
                const current = new Date(startOfWeek);
                current.setDate(startOfWeek.getDate() + index);
                const key = current.toDateString();
                appointmentsPerDay.labels.push(current.toLocaleDateString('fr-FR', { weekday: 'short' }));
                appointmentsPerDay.values.push(0);
                appointmentMap[key] = index;
            }
            appointments.forEach(appointment => {
                const appointmentDate = new Date(appointment.date);
                const key = appointmentDate.toDateString();
                if (appointmentMap[key] !== undefined) appointmentsPerDay.values[appointmentMap[key]]++;
            });

            const admissionsTrend = { labels: [], values: [] };
            const trendMap = {};
            for (let index = 29; index >= 0; index--) {
                const current = new Date();
                current.setHours(0, 0, 0, 0);
                current.setDate(current.getDate() - index);
                const key = current.toDateString();
                admissionsTrend.labels.push(current.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }));
                admissionsTrend.values.push(0);
                trendMap[key] = admissionsTrend.values.length - 1;
            }
            patients.forEach(patient => {
                const createdDate = new Date(patient.created_at);
                const key = createdDate.toDateString();
                if (trendMap[key] !== undefined) admissionsTrend.values[trendMap[key]]++;
            });

                    <div class="dashboard-time-card">

                        <small>${escapeHtml(getRoleLabel(currentUser?.role))}</small>
                    </div>
                </section>
                <div class="stats-grid">
                    ${stats.map(stat => `
                        <div class="stat-card">
                            <div class="stat-header"><i class="fas ${stat.icon}"></i></div>
                            <div class="stat-value">${stat.value}</div>
                            <div class="stat-label">${stat.label}</div>

                    `).join('')}
                </div>
                <div class="insight-strip">
                    ${viewFinance ? `<div class="insight-card"><div class="label">Revenus encaissés</div><div class="value">${formatMoney(paidRevenue)}</div></div><div class="insight-card"><div class="label">Taux de paiement</div><div class="value">${paymentRate}%</div></div>` : ''}
                    ${viewPharmacy ? `<div class="insight-card"><div class="label">Stocks sous seuil</div><div class="value">${lowStockCount}</div></div>` : ''}
                </div>
                <div class="chart-hero-grid">
                    <div class="chart-panel">
                        <h3><i class="fas fa-chart-pie" style="color:var(--primary);"></i> Répartition des patients</h3>
                        <canvas id="patientStatusChart"></canvas>
                    </div>
                    ${viewAppointments ? `<div class="chart-panel"><h3><i class="fas fa-chart-column" style="color:var(--primary);"></i> Rendez-vous par jour</h3><canvas id="appointmentsBarChart"></canvas></div>` : ''}
                    <div class="chart-panel">
                        <h3><i class="fas fa-chart-line" style="color:var(--primary);"></i> Évolution des admissions</h3>
                        <canvas id="admissionsLineChart"></canvas>
                    </div>
                    ${viewFinance ? `<div class="chart-panel chart-gauge"><h3><i class="fas fa-chart-pie" style="color:var(--primary);"></i> Paiement et factures</h3><div class="finance-donut-layout"><div class="finance-donut-wrap"><canvas id="invoiceGaugeChart"></canvas><div class="finance-donut-center"><strong>${paymentRate}%</strong><span>payé</span></div></div><div class="invoice-summary-grid"><div class="invoice-summary-tile paid"><div class="label">Payées</div><div class="value">${invoices.filter(invoice => invoice.status === 'paid').length}</div></div><div class="invoice-summary-tile unpaid"><div class="label">Impayées</div><div class="value">${unpaidInvoices}</div></div></div></div></div>` : ''}

                <div class="dashboard-grid dashboard-records-grid">
                    <div class="dashboard-card">
                        <h3><i class="fas fa-user-injured"></i> Derniers patients</h3>
                        ${buildTableSection(
                            ['Nom', 'Téléphone', 'Statut', 'Date'],
                            patientsCache.slice(0, 6).map(patient => `
                                <tr>
                                    <td><strong>${escapeHtml(patient.full_name)}</strong></td>
                                    <td>${escapeHtml(safeText(patient.phone))}</td>
                                    <td><span class="badge badge-${getPatientStatusBadgeClass(patient.status)}">${escapeHtml(getPatientStatusLabel(patient.status))}</span></td>

                    ${viewFinance ? `<div class="dashboard-card">

                        ${buildTableSection(
                            ['Facture', 'Patient', 'Montant', 'Statut'],

            if (typeof Chart !== 'undefined') {
                const patientStatusCanvas = document.getElementById('patientStatusChart');
                if (patientStatusCanvas) {
                    new Chart(patientStatusCanvas, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(patientStatusCounts),
                            datasets: [{
                                data: Object.values(patientStatusCounts),
                                backgroundColor: ['#1e7b9e', '#f39c12', '#3498db'],
                                borderColor: '#ffffff',
                                borderWidth: 3
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '62%' }

                }

                if (viewAppointments) {
                    const appointmentsCanvas = document.getElementById('appointmentsBarChart');
                    if (appointmentsCanvas) {
                        new Chart(appointmentsCanvas, {
                            type: 'bar',
                            data: {
                                labels: appointmentsPerDay.labels,
                                datasets: [{
                                    label: 'Rendez-vous',
                                    data: appointmentsPerDay.values,
                                    borderRadius: 14,
                                    backgroundColor: '#0a5c7e'
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                            }
                        });
                    }
                }

                const admissionsCanvas = document.getElementById('admissionsLineChart');
                if (admissionsCanvas) {
                    new Chart(admissionsCanvas, {
                        type: 'line',

                }

                if (viewFinance) {
                    const gaugeCanvas = document.getElementById('invoiceGaugeChart');
                    if (gaugeCanvas) {

        function buildTableSection(headers, rowsMarkup, emptyMessage) {
            if (!rowsMarkup.length) {
                return `<div class="empty-state"><i class="fas fa-folder-open" style="font-size:20px;margin-bottom:8px;color:var(--primary);"></i><div>${emptyMessage}</div></div>`;
            }
            return `
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr>${headers.map(header => `<th>${header}</th>`).join('')}</tr></thead>
                        <tbody>${rowsMarkup.join('')}</tbody>
                    </table>
                </div>
            `;
        }

        // ==================== PATIENTS MODULE ====================
        async function loadPatients() {
            const allPatients = sortByDateDesc(await api.get('/patients'), 'created_at');
            patientsCache = await filterPatientsForCurrentRole(allPatients);
            const admittedCount = patientsCache.filter(patient => patient.status === 'admitted').length;
            const dischargedCount = patientsCache.filter(patient => patient.status === 'discharged').length;

            document.getElementById('mainContent').innerHTML = `
                <div class="page-header">
                    <h1><i class="fas fa-users"></i> Gestion des patients</h1>
                    ${canCreatePatients() ? '<button class="btn btn-primary" onclick="showAddPatientModal()"><i class="fas fa-plus"></i> Nouveau patient</button>' : ''}
                </div>
                <div class="insight-strip">
                    <div class="insight-card"><div class="label">Total patients</div><div class="value">${patientsCache.length}</div></div>
                    <div class="insight-card"><div class="label">Hospitalisés</div><div class="value">${admittedCount}</div></div>
                    <div class="insight-card"><div class="label">Sortis</div><div class="value">${dischargedCount}</div></div>
                    <div class="insight-card"><div class="label">Actifs</div><div class="value">${patientsCache.length - admittedCount - dischargedCount}</div></div>
                </div>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchPatient" placeholder="Rechercher par nom, téléphone ou email..." oninput="debouncedSearchPatients()">
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr><th>ID</th><th>Nom</th><th>Téléphone</th><th>Email</th><th>Statut</th><th>Actions</th></tr></thead>
                        <tbody id="patientsTableBody">${renderPatientRows(patientsCache)}</tbody>
                    </table>
                </div>
            `;
        }

        function renderPatientRows(patients) {
            if (!patients.length) return '<tr><td colspan="6" style="text-align:center;">Aucun patient</td></tr>';
            return patients.map(patient => `
                <tr>
                    <td><strong>#${patient.id}</strong></td>
                    <td><strong>${escapeHtml(patient.full_name)}</strong>${patient.is_pregnant ? ' <span class="badge badge-warning">Femme enceinte</span>' : ''}<br><small style="color:var(--gray-dark);">${escapeHtml(getGenderLabel(patient.gender))} • ${escapeHtml(safeText(patient.blood_type))}</small></td>
                    <td>${escapeHtml(safeText(patient.phone))}</td>
                    <td>${escapeHtml(safeText(patient.email))}</td>
                    <td><span class="badge badge-${getPatientStatusBadgeClass(patient.status)}">${escapeHtml(getPatientStatusLabel(patient.status))}</span></td>
                    <td>
                        <div class="action-stack">
                            <button class="btn btn-info btn-sm" onclick="viewPatientDetails(${patient.id})"><i class="fas fa-id-card"></i> Fiche</button>
                            <button class="btn btn-outline-primary btn-sm" onclick="exportPatientPDF(${patient.id})"><i class="fas fa-file-pdf"></i> PDF</button>
                            <button class="btn btn-primary btn-sm" onclick="editPatient(${patient.id})"><i class="fas fa-edit"></i> Modifier</button>
                            ${currentUser.role === 'super_admin' ? `<button class="btn btn-danger btn-sm" onclick="deletePatient(${patient.id})"><i class="fas fa-trash"></i> Supprimer</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function debouncedSearchPatients() {
            clearTimeout(patientSearchTimer);
            patientSearchTimer = setTimeout(() => searchPatients(), 250);
        }

        async function searchPatients() {
            const term = document.getElementById('searchPatient')?.value?.trim() || '';
            const tbody = document.getElementById('patientsTableBody');
            if (!tbody) return;
            try {
                const patients = term ? await api.get(`/patients?search=${encodeURIComponent(term)}`) : await api.get('/patients');
                tbody.innerHTML = renderPatientRows(await filterPatientsForCurrentRole(sortByDateDesc(patients, 'created_at')));
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function showAddPatientModal() {
            if (!canCreatePatients()) { showToast('Creation de patient reservee a l\'administration et a la reception.', 'error'); return; }
            document.body.insertAdjacentHTML('beforeend', `<div class="modal active" id="patientModal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-user-plus"></i> Nouveau patient</h3><span class="close-modal" onclick="closeModal('patientModal')">&times;</span></div>
            <form onsubmit="createPatient(event)"><div class="form-group"><label class="form-label">Nom complet *</label><input type="text" class="form-control" id="patientName" required></div>
            <div class="form-group"><label class="form-label">Téléphone</label><input type="tel" class="form-control" id="patientPhone"></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="patientEmail"></div>
            <div class="form-group"><label class="form-label">Date de naissance</label><input type="date" class="form-control" id="patientDob"></div>
            <div class="form-group"><label class="form-label">Genre</label><select class="form-control" id="patientGender"><option value="M">Masculin</option><option value="F">Féminin</option></select></div>

            <div class="form-group"><label class="form-label">Groupe sanguin</label><select class="form-control" id="patientBlood"><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option></select></div>

        async function createPatient(event) {
            event.preventDefault();
            showLoading();
            try {
                assert(canCreatePatients(), 'Creation de patient reservee a l\'administration et a la reception.');
                const patientGender = document.getElementById('patientGender').value;
                const isPregnant = document.getElementById('patientPregnant')?.checked || false;
                assert(!isPregnant || patientGender === 'F', 'La grossesse ne peut etre cochee que pour une patiente.');
                await api.post('/patients', {
                    full_name: sanitizeInput(document.getElementById('patientName').value),
                    phone: sanitizeInput(document.getElementById('patientPhone').value),
                    email: sanitizeInput(document.getElementById('patientEmail').value),
                    date_of_birth: document.getElementById('patientDob').value || null,
                    gender: patientGender,
                    blood_type: document.getElementById('patientBlood').value,
                    address: sanitizeInput(document.getElementById('patientAddress').value),
                    is_pregnant: isPregnant
                });
                showToast('Patient créé.', 'success');
                closeModal('patientModal');
                loadPatients();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function viewPatientDetails(id) {
            showLoading();
            try {
                const [patient, appointments, prescriptions, labResults] = await Promise.all([
                    api.get(`/patients/${id}`),
                    api.get(`/patients/${id}/appointments`),
                    api.get(`/patients/${id}/prescriptions`),
                    api.get(`/patients/${id}/lab-results`)
                ]);
                const html = buildPatientPrintTemplate(patient, appointments, prescriptions, labResults);
                document.body.insertAdjacentHTML('beforeend', `
                    <div class="modal active" id="patientDetailsModal">
                        <div class="modal-content" style="width:min(96vw,1180px);max-width:1180px;height:92vh;padding:0;overflow:hidden;">
                            <div class="modal-header" style="padding:14px 18px;">
                                <h3><i class="fas fa-user-circle"></i> Fiche patient</h3>
                                <span class="close-modal" onclick="closeModal('patientDetailsModal')">&times;</span>
                            </div>
                            <iframe id="patientDetailsFrame" title="Fiche patient" style="width:100%;height:calc(92vh - 58px);border:0;background:#eaf4fb;"></iframe>
                        </div>

                const frame = document.getElementById('patientDetailsFrame');
                frame.contentDocument.open();
                frame.contentDocument.write(html);

                showToast(error.message, 'error');

                hideLoading();

        async function editPatient(id) {
            try {
                const patient = await api.get(`/patients/${id}`);
                document.body.insertAdjacentHTML('beforeend', `<div class="modal active" id="editPatientModal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-user-edit"></i> Modifier patient</h3><span class="close-modal" onclick="closeModal('editPatientModal')">&times;</span></div>
                <form onsubmit="updatePatient(event, ${id})"><div class="form-group"><label class="form-label">Nom *</label><input type="text" class="form-control" id="editPatientName" value="${escapeHtml(patient.full_name)}" required></div>

            } catch (error) { showToast(error.message, 'error'); }

        async function updatePatient(event, id) {
            event.preventDefault();
            showLoading();
            try {
                await api.put(`/patients/${id}`, {
                    full_name: sanitizeInput(document.getElementById('editPatientName').value),
                    phone: sanitizeInput(document.getElementById('editPatientPhone').value),
                    email: sanitizeInput(document.getElementById('editPatientEmail').value),
                    status: document.getElementById('editPatientStatus').value
                });
                showToast('Patient modifié.', 'success');
                closeModal('editPatientModal');
                loadPatients();
            } catch (error) { showToast(error.message, 'error'); }
            finally { hideLoading(); }
        }

        async function deletePatient(id) {
            if (!confirm('Supprimer ce patient ?')) return;
            showLoading();
            try {
                await api.delete(`/patients/${id}`);
                showToast('Patient supprimé.', 'success');
                loadPatients();
            } catch (error) { showToast(error.message, 'error'); }
            finally { hideLoading(); }
        }

        async function exportPatientPDF(id) {
            const printWindow = window.open('', '_blank');
            if (!printWindow) {
                showToast('Autorisez les popups pour ouvrir la fiche patient.', 'warning');
                return;
            }
            printWindow.document.write('<p style="font-family:Arial;padding:24px">Preparation de la fiche patient...</p>');
            showLoading();
            try {
                const [patient, appointments, prescriptions, labResults] = await Promise.all([
                    api.get(`/patients/${id}`),
                    api.get(`/patients/${id}/appointments`).catch(() => []),
                    api.get(`/patients/${id}/prescriptions`).catch(() => []),
                    api.get(`/patients/${id}/lab-results`).catch(() => [])
                ]);
                const html = buildPatientPrintTemplate(patient, appointments, prescriptions, labResults);
                printWindow.document.open();
                printWindow.document.write(html);
                printWindow.document.close();
                showToast('Fiche patient prete pour impression PDF.', 'success');
            } catch (error) {
                printWindow.close();
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function createMedication(event) {
            event.preventDefault();
            const form = event.currentTarget;
            if (!beginFormSubmission(form, 'Ajout...')) return;
            showLoading();
            try {
                const medicationName = sanitizeInput(document.getElementById('medicationName').value);
                const quantity = parseIntegerInput(document.getElementById('medicationQuantity').value);
                const threshold = parseIntegerInput(document.getElementById('medicationThreshold').value, 0);
                const unit = sanitizeInput(document.getElementById('medicationUnit').value) || 'unité';
                const purchasePrice = roundMoney(parseAmountInput(document.getElementById('medicationPurchasePrice').value, 0));
                const sellingPrice = roundMoney(parseAmountInput(document.getElementById('medicationSellingPrice').value));
                const expiryDate = document.getElementById('medicationExpiry').value;
                assert(medicationName.length >= 2, 'Le nom du médicament est trop court.');
                assert(quantity >= 0, 'La quantité doit être positive ou nulle.');
                assert(threshold >= 0, 'Le seuil critique doit être positif ou nul.');
                assert(purchasePrice >= 0, 'Le prix d\'achat doit etre positif ou nul.');
                assert(sellingPrice > 0, 'Le prix de vente est obligatoire.');
                if (expiryDate) assert(!Number.isNaN(new Date(expiryDate).getTime()), 'La date d\'expiration est invalide.');
                await api.post('/pharmacy', {
                    medication_name: medicationName,
                    quantity,
                    unit,
                    threshold,
                    purchase_price: purchasePrice,
                    selling_price: sellingPrice,
                    expiry_date: expiryDate || null
                });
                showToast('Médicament ajouté', 'success');
                closeModal('medicationModal');
                loadPharmacyStock();
            } catch(error) { showToast(error.message, 'error'); }
            finally { hideLoading(); endFormSubmission(form); }
        }

        async function updateStock(id) {
            try {
                const med = await api.get(`/pharmacy/${id}`);
                document.body.insertAdjacentHTML('beforeend', `<div class="modal active" id="updateStockModal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-boxes"></i> Modifier stock - ${escapeHtml(med.medication_name)}</h3><span class="close-modal" onclick="closeModal('updateStockModal')">&times;</span></div>
                <form onsubmit="updateStockQuantity(event, ${id})"><div class="form-group"><label class="form-label">Quantité actuelle: <strong>${med.quantity}</strong></label></div>
                <div class="form-group"><label class="form-label">Opération *</label><select class="form-control" id="operationType" required><option value="set">Définir</option><option value="add">Ajouter</option><option value="remove">Retirer</option></select></div>
                <div class="form-group"><label class="form-label">Quantité *</label><input type="number" class="form-control" id="newQuantity" required min="0"></div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Mettre à jour</button></form></div></div>`);
                document.querySelector('#updateStockModal form')?.setAttribute('data-current-quantity', String(med.quantity));
            } catch(error) { showToast(error.message, 'error'); }
        }

        async function updateStockQuantity(event, id) {
            event.preventDefault();
            const form = event.currentTarget;
            if (!beginFormSubmission(form, 'Mise à jour...')) return;
            showLoading();
            try {
                const quantity = parseIntegerInput(document.getElementById('newQuantity').value);
                const operation = document.getElementById('operationType').value;
                const currentQuantity = parseIntegerInput(form.dataset.currentQuantity, 0);
                assert(quantity >= 0, 'La quantité est invalide.');
                assert(['set', 'add', 'remove'].includes(operation), 'Opération de stock invalide.');
                if (operation === 'remove') {
                    assert(quantity <= currentQuantity, 'Impossible de retirer plus que le stock disponible.');
                }
                await api.put(`/pharmacy/${id}/stock`, {
                    quantity,
                    operation
                });
                showToast('Stock mis à jour', 'success');
                closeModal('updateStockModal');
                loadPharmacyStock();
            } catch(error) { showToast(error.message, 'error'); }
            finally { hideLoading(); endFormSubmission(form); }
        }

        function addPharmacyCartItem(event, id) {
            event.preventDefault();
            const medication = pharmacyStockCache.find(item => String(item.id) === String(id));
            if (!medication) return showToast('Medicament introuvable.', 'error');
            const quantity = parseIntegerInput(document.getElementById('cartMedicationQuantity').value);
            const unitPrice = parseAmountInput(document.getElementById('cartMedicationUnitPrice').value);
            if (quantity <= 0 || quantity > Number(medication.quantity)) return showToast('Quantite invalide.', 'warning');

        function updatePharmacyCartPatient(patientId) {
            pharmacyCart.patientId = patientId;
        }

        function removePharmacyCartItem(index) {
            pharmacyCart.splice(index, 1);
            loadPharmacyStock();
        }

        async function checkoutPharmacyCart() {
            const patientId = document.getElementById('cartPatientId')?.value || pharmacyCart.patientId;
            if (!patientId) return showToast('Selectionnez un patient.', 'warning');
            if (!pharmacyCart.length) return showToast('Panier vide.', 'warning');
            showLoading();
            try {
                const lines = pharmacyCart.map(item => ({
                    medication_id: item.id,
                    description: item.name,
                    quantity: item.quantity,
                    unit_price: item.unitPrice,
                    amount: roundMoney(item.quantity * item.unitPrice)
                }));
                const response = await api.post('/billing/grouped', {
                    patient_id: patientId,
                    source: 'pharmacy',
                    description: 'Facture groupee pharmacie',
                    items: lines
                });
                pharmacyCart = [];
                await loadPharmacyStock();
                showToast('Panier facture avec succes.', 'success');
                const invoice = normalizeInvoiceRecord(response?.invoice || response);
                if (invoice?.id && confirm('Exporter la facture groupee en PDF ?')) await exportInvoicePDF(invoice.id);

            finally { hideLoading(); }

        function updateDispenseAmountPreview() {

            const unitPrice = parseAmountInput(document.getElementById('dispenseUnitPrice')?.value, 0);

        async function processPharmacyPurchase(event, id) {
            event.preventDefault();
            const form = event.currentTarget;
            if (!beginFormSubmission(form, 'Validation...')) return;
            showLoading();
            try {
                assert(canSeePharmacy(), 'Cette action est réservée à la pharmacie.');
                const patientId = sanitizeInput(document.getElementById('dispensePatientId').value);
                const quantity = parseIntegerInput(document.getElementById('dispenseQuantity').value);
                const unitPrice = parseAmountInput(document.getElementById('dispenseUnitPrice').value);
                const description = sanitizeInput(document.getElementById('dispenseDescription').value);
                assert(patientId, 'Veuillez sélectionner un patient.');
                assert(quantity > 0, 'La quantité doit être supérieure à zéro.');
                assert(unitPrice > 0, 'Le prix unitaire doit être supérieur à zéro.');
                const medication = await api.get(`/pharmacy/${id}`);
                assert(quantity <= Number(medication.quantity), 'Stock insuffisant pour cette vente.');
                await api.put(`/pharmacy/${id}/stock`, {
                    quantity,
                    operation: 'remove'
                });
                let createdInvoice = null;
                try {
                    const invoiceResponse = await api.post('/billing/grouped', {
                        patient_id: patientId,
                        description: description || `Achat pharmacie - ${sanitizeInput(medication.medication_name)} x${quantity}`,
                        items: [{
                            medication_id: id,
                            description: sanitizeInput(medication.medication_name),
                            quantity,
                            unit_price: unitPrice,
                            amount: roundMoney(quantity * unitPrice)
                        }]
                    });
                    createdInvoice = normalizeInvoiceRecord(invoiceResponse);
                } catch (invoiceError) {
                    try {
                        await api.put(`/pharmacy/${id}/stock`, {
                            quantity,
                            operation: 'add'
                        });
                    } catch (rollbackError) {
                        throw new Error(`Facture non créée et restauration du stock impossible: ${invoiceError.message}`);
                    }
                    throw new Error(`Facture non créée. Le stock a été restauré. ${invoiceError.message}`);
                }
                if (createdInvoice) {
                    billingCache = sortByDateDesc([
                        createdInvoice,
                        ...billingCache.filter(invoice => String(invoice.id) !== String(createdInvoice.id))
                    ], 'created_at');
                }
                closeModal('dispenseMedicationModal');
                await loadPharmacyStock();
                showToast('Vente enregistrée et facture générée.', 'success');
                if (createdInvoice?.id && confirm('Voulez-vous exporter la facture en PDF maintenant ?')) {
                    await exportInvoicePDF(createdInvoice.id);
                }
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
                endFormSubmission(form);
            }
        }

        async function createInvoice(event) {
            event.preventDefault();
            const form = event.currentTarget;
            if (!beginFormSubmission(form, 'Création...')) return;
            showLoading();
            try {
                const patientId = sanitizeInput(document.getElementById('invoicePatientId').value);
                const amount = roundMoney(parseAmountInput(document.getElementById('invoiceAmount').value));
                const description = sanitizeInput(document.getElementById('invoiceDescription').value);
                assert(patientId, 'Veuillez sélectionner un patient.');
                assert(amount > 0, 'Le montant doit être supérieur à zéro.');
                const response = await api.post('/billing', {
                    patient_id: patientId,
                    amount,
                    description
                });
                const createdInvoice = normalizeInvoiceRecord(response);
                if (createdInvoice) {
                    billingCache = sortByDateDesc([
                        createdInvoice,
                        ...billingCache.filter(invoice => String(invoice.id) !== String(createdInvoice.id))
                    ], 'created_at');
                }
                showToast('Facture créée.', 'success');
                closeModal('invoiceModal');
                loadInvoices();
            } catch (error) { showToast(error.message, 'error'); }
            finally { hideLoading(); endFormSubmission(form); }
        }

                showToast('Facture payée.', 'success');
                loadInvoices();
            } catch (error) { showToast(error.message, 'error'); }

                return;
            }
            printWindow.document.write('<p style="font-family:Arial;padding:24px">Preparation de la facture...</p>');

            try {

                    billingCache = invoices;
                    invoice = invoices.find(item => String(item.id) === String(id));

        // ==================== AUDIT ====================
        async function loadAuditLogs(filters = {}) {
            showLoading();
            try {
                let logs = [];
                try {
                    const queryParams = new URLSearchParams(filters);
                    const endpoint = `/audit${queryParams.toString() ? '?' + queryParams.toString() : ''}`;
                    logs = await api.get(endpoint);
                } catch (error) {
                    if (error.message.includes('404')) {
                        console.warn('Endpoint /audit non disponible');
                        logs = [];
                    } else {
                        throw error;
                    }
                }
                if (!logs.length) {
                    renderEmptyAuditLogs();
                    return;
                }
                const sortedLogs = [...logs].sort((a, b) => {
                    const dateA = new Date(a.created_at || a.timestamp || 0);
                    const dateB = new Date(b.created_at || b.timestamp || 0);
                    return dateB - dateA;
                });
                const stats = sortedLogs.reduce((acc, log) => {
                    const action = log.action || log.type || 'autre';
                    acc.actionCounts[action] = (acc.actionCounts[action] || 0) + 1;
                    acc.users.add(log.user_name || log.user || 'Système');
                    return acc;
                }, { actionCounts: {}, users: new Set() });
                renderAuditLogs(sortedLogs, stats);
            } catch(error) {
                console.error('Erreur chargement audit:', error);
                showToast('Erreur chargement audit: ' + error.message, 'error');
                renderErrorState(error.message);
            } finally {
                hideLoading();
            }
        }

            const { actionCounts, users } = stats;
            document.getElementById('mainContent').innerHTML = `

        function convertToCSV(logs) {
            const headers = ['action', 'entity_type', 'user_name', 'details', 'created_at'];
            const rows = logs.map(log => headers.map(h => log[h] || '').join(','));
            return [headers.join(','), ...rows].join('\n');
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        }

            for (let i = 0; i < babyCount; i++) {

                html += `

        async function createDelivery(event) {
            event.preventDefault();
            showLoading();
            try {
                const patientId = document.getElementById('deliveryPatientId').value;
                const deliveryDate = document.getElementById('deliveryDate').value;
                const deliveryType = document.getElementById('deliveryType').value;
                const babyCount = parseInt(document.getElementById('deliveryBabyCount').value);
                if (!patientId || !deliveryDate || !deliveryType) throw new Error('Veuillez remplir tous les champs requis');
                const babies = [];
                for (let i = 1; i <= babyCount; i++) {
                    babies.push({
                        gender: document.getElementById(`babyGender${i}`)?.value || 'M',
                        weight: parseInt(document.getElementById(`babyWeight${i}`)?.value) || null,
                        observations: document.getElementById(`babyObservations${i}`)?.value || null
                    });
                }
                await api.post('/maternity/deliveries', {
                    patient_id: parseInt(patientId),
                    delivery_date: deliveryDate,
                    delivery_type: deliveryType,
                    baby_count: babyCount,
                    babies: babies,
                    observations: document.getElementById('deliveryObservations').value
                });

                closeModal('deliveryModal');
                loadDeliveriesPage();

        function isWorkflowRole(group) {

                admin: ['super_admin'],

                nurse: ['infirmier'],
                lab: ['laboratoire'],
                pharmacy: ['pharmacie'],
                reception: ['reception']
            };

        const PATIENT_STATUS = {
            waiting: { label: 'En attente', color: 'warning' },
            assigned: { label: 'Assigné', color: 'info' },
            in_consultation: { label: 'En consultation', color: 'info' },

        function hasVitalsFor(patientId) {
            return workflowState.vitals.some(v => String(v.patient_id || v.patient?.id) === String(patientId));

        async function loadQueuePage() {
            const main = document.getElementById('mainContent');
            if (!main) return;
            main.innerHTML = `<div class="page-header"><div><h1><i class="fas fa-clock"></i> File d'attente</h1><p>Patients en attente de prise en charge</p></div>
                ${isWorkflowRole('reception') || isWorkflowRole('admin') || isWorkflowRole('nurse') ? `<button class="btn btn-primary" onclick="showAddToQueueModal()"><i class="fas fa-plus"></i> Ajouter à la file</button>` : ''}

            try {
                const [data, vitals] = await Promise.all([api.get('/workflow/queue'), api.get('/workflow/vitals').catch(()=>[])]);
                workflowState.queue = Array.isArray(data) ? data : (data?.items || []);
                workflowState.vitals = Array.isArray(vitals) ? vitals : (vitals?.items || []);
                renderQueueTable();

        function renderQueueTable() {
            const c = document.getElementById('workflowQueueContainer');
            if (!c) return;
            if (!workflowState.queue.length) { c.innerHTML = `<div class="empty-state"><i class="fas fa-clock"></i><p>Aucun patient en file</p></div>`; return; }
            c.innerHTML = `
                <div class="filters-row">
                    <input class="form-control" id="queueSearch" placeholder="🔍 Rechercher patient..." oninput="filterQueue(this.value)">
                </div>
                <div class="table-container"><table class="data-table"><thead><tr>
                    <th>#</th><th>Patient</th><th>Heure d'arrivée</th><th>Statut</th><th>Actions</th>
                </tr></thead><tbody id="queueTbody">${workflowState.queue.map(rowQueue).join('')}</tbody></table></div>`;
        }

        function rowQueue(q, i) {
            const pid = q.patient_id || q.id;
            const pname = q.patient_name || q.patient?.name || '—';
            return `<tr><td>${q.order ?? (i+1)}</td>
                <td><strong>${escapeHtml(pname)}</strong></td>
                <td>${fmtDate(q.arrived_at || q.created_at)}</td>
                <td>${statusBadge(q.status || 'waiting')}</td>
                <td>
                    ${isWorkflowRole('nurse') || isWorkflowRole('admin') ? `<button class="btn btn-sm btn-info" onclick="openVitalsFor(${pid})" title="Signes vitaux"><i class="fas fa-heartbeat"></i> SV</button>` : ''}
                    ${isWorkflowRole('nurse') || isWorkflowRole('admin') ? `<button class="btn btn-sm btn-primary" ${hasVitalsFor(pid) ? '' : 'disabled title="Signes vitaux obligatoires avant dispatch"'} onclick="openDispatchFor(${pid})"><i class="fas fa-user-md"></i> Dispatch</button>` : ''}
                    ${isWorkflowRole('doctor') ? `<button class="btn btn-sm btn-success" onclick="loadMedicalRecordPage(${pid})"><i class="fas fa-folder-open"></i> Dossier</button>` : ''}
                </td></tr>`;
        }

        function filterQueue(q) {
            const tbody = document.getElementById('queueTbody');
            if (!tbody) return;
            const term = (q || '').toLowerCase();
            const filtered = workflowState.queue.filter(x => (x.patient_name || x.patient?.name || '').toLowerCase().includes(term));
            tbody.innerHTML = filtered.map(rowQueue).join('');
        }

        // ==================== TARIFFS & RATES ====================
        const RATE_KEY = 'i_hub_daily_rate';
        const TARIFFS_KEY = 'i_hub_tariffs';
        const DEFAULT_TARIFFS = [
            { id: 't1', code: 'CONSULT', label: 'Consultation médicale', price_usd: 10, category: 'Consultation' },
            { id: 't2', code: 'EXAM_LAB', label: 'Examen de laboratoire', price_usd: 10, category: 'Laboratoire' },
            { id: 't3', code: 'HOSPI_DAY', label: 'Hospitalisation / jour', price_usd: 20, category: 'Hospitalisation' },
            { id: 't4', code: 'ACTE_INF', label: 'Acte infirmier', price_usd: 5, category: 'Soins' },
            { id: 't5', code: 'URGENCE', label: 'Urgence', price_usd: 15, category: 'Consultation' },
            { id: 't6', code: 'PANSEMENT', label: 'Pansement', price_usd: 3, category: 'Soins' }
        ];

        function getRate() {
            try {
                const data = JSON.parse(localStorage.getItem(RATE_KEY));
                return data?.rate || 2800;
            } catch { return 2800; }
        }

        function setRate(rate) {
            localStorage.setItem(RATE_KEY, JSON.stringify({ rate: Number(rate), updated_at: new Date().toISOString(), by: currentUser?.name || '—' }));
        }

        function getTariffs() {
            try {
                const data = JSON.parse(localStorage.getItem(TARIFFS_KEY));
                return data || DEFAULT_TARIFFS;
            } catch { return DEFAULT_TARIFFS; }
        }

        function saveTariffs(list) {
            localStorage.setItem(TARIFFS_KEY, JSON.stringify(list));
        }

        function canEditTariffs() {
            return isAdmin();
        }

        function canReadTariffs() {
            return isAdmin() || getCurrentRole() === 'reception';
        }

        async function loadTariffsPage() {
            const main = document.getElementById('mainContent');
            if (!main) return;
            if (!canReadTariffs()) {
                main.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Grille tarifaire réservée à l'administration et la réception.</p></div>`;
                return;
            }
            const list = getTariffs();
            const editable = canEditTariffs();
            main.innerHTML = `
                <div class="page-header">
                    <div><h1><i class="fas fa-tags"></i> Grille tarifaire</h1>
                    <p>${editable ? 'Modifiez les tarifs (admin)' : 'Lecture seule (réception)'}</p></div>
                    ${editable ? `<button class="btn btn-primary" onclick="showAddTariffModal()"><i class="fas fa-plus"></i> Nouveau tarif</button>` : ''}
                </div>
                <div class="table-container"><table class="data-table">
                    <thead><tr><th>Code</th><th>Libellé</th><th>Catégorie</th><th>Prix (USD)</th>${editable ? '<th>Actions</th>' : ''}</tr></thead>
                    <tbody>${list.map(t => `
                        <tr>
                            <td><code>${escapeHtml(t.code)}</code></td>
                            <td>${escapeHtml(t.label)}</td>
                            <td><span class="badge badge-info">${escapeHtml(t.category||'—')}</span></td>
                            <td>${t.price_usd} $</td>
                            ${editable ? `<td>
                                <button class="btn btn-sm btn-secondary" onclick="editTariff('${t.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="deleteTariff('${t.id}')"><i class="fas fa-trash"></i></button>
                            </td>` : ''}
                        </tr>
                    `).join('')}</tbody></table></div>
            `;
        }

        function showAddTariffModal() {
            document.body.insertAdjacentHTML('beforeend', `
                <div class="modal active" id="tariffModal">
                    <div class="modal-content" style="max-width:500px;">
                        <div class="modal-header"><h3><i class="fas fa-plus"></i> Nouveau tarif</h3><span class="close-modal" onclick="closeModal('tariffModal')">&times;</span></div>
                        <form id="tariffForm">
                            <div class="form-group"><label class="form-label">Code *</label><input class="form-control" id="tCode" required></div>
                            <div class="form-group"><label class="form-label">Libellé *</label><input class="form-control" id="tLabel" required></div>
                            <div class="form-group"><label class="form-label">Catégorie</label>
                                <select class="form-control" id="tCat">
                                    ${['Consultation','Laboratoire','Hospitalisation','Soins','Pharmacie','Autre'].map(c => `<option>${c}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group"><label class="form-label">Prix (USD) *</label><input type="number" step="0.01" class="form-control" id="tPrice" required></div>
