
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="I Hub - Système de gestion hospitalière">
    <meta name="theme-color" content="#0a5c7e">
    <title>I Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="logo.jpg">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <img src="logo.jpg" alt="I Hub" class="loading-logo">
            <div class="loading-pulse"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-container" id="authContainer">
        <div class="auth-split">
            <section class="auth-branding" aria-label="Présentation de l'hôpital">
                <div class="branding-content">
                    <div class="branding-logo-block">
                        <img src="logo.jpg" alt="Logo de l'hôpital" class="brand-logo-img">
                        <div class="branding-copy">
                            <p class="branding-kicker">I Hub</p>
                            <h1 class="branding-title">Gestion hospitalière centralisée</h1>
                            <p class="branding-text">
                                Admissions, prescriptions, laboratoire, pharmacie et facturation dans un seul espace.
                            </p>
                        </div>
                    </div>
                </div>
                <div class="branding-footer">
                    <p class="branding-hospital-name">Hôpital I Hub</p>
                </div>
            </section>

            <section class="auth-form-container" aria-label="Authentification">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-logo-mobile">
                            <img src="logo.jpg" alt="I Hub" class="mobile-logo-img">
                        </div>
                        <h2 class="auth-title" id="appName">I Hub</h2>
                        <p class="auth-subtitle">Hospital Management System</p>
                        <p class="auth-welcome">Bienvenue dans votre espace de travail sécurisé</p>
                    </div>

                    <div class="tab-buttons">
                        <button class="tab-btn active" type="button" onclick="switchTab('login')">Connexion</button>
                        <button class="tab-btn" type="button" onclick="switchTab('register')">Inscription</button>
                    </div>

                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label" for="loginEmail">Email professionnel</label>
                            <input type="email" class="form-control" id="loginEmail" required placeholder="nom@ushuda.com" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="loginPassword">Mot de passe</label>
                            <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                        </div>
                        <label class="remember-row">
                            <input type="checkbox" id="rememberMe">
                            <span>Rester connecté sur cet appareil</span>
                        </label>
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-arrow-right"></i> Se connecter
                        </button>
                    </form>

                    <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
                        <div class="form-group">
                            <label class="form-label" for="registerName">Nom complet</label>
                            <input type="text" class="form-control" id="registerName" required autocomplete="name" placeholder="jeremih odimba">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="registerEmail">Email professionnel</label>
                            <input type="email" class="form-control" id="registerEmail" required placeholder="prenom.nom@ushuda.com" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="registerPassword">Mot de passe</label>
                            <input type="password" class="form-control" id="registerPassword" required minlength="8" autocomplete="new-password">
                            <small class="field-hint">Minimum 8 caractères</small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="registerRole">Rôle</label>
                            <select class="form-control" id="registerRole">
                                <option value="docteur">Médecin</option>
                                <option value="infirmier">Infirmière</option>
                                <option value="laboratoire">Laboratoire</option>
                                <option value="pharmacie">Pharmacie</option>
                                <option value="reception">Réception</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-user-plus"></i> Créer mon compte
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p><i class="fas fa-shield-alt"></i> Système sécurisé pour les opérations médicales</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            API_URL: 'https://jokair.onrender.com/api',
            AI_API_URL: 'https://odimba-1.onrender.com/api/ai',
            APP_NAME: 'I-Hub',
            APP_VERSION: '1.0.0',
            HOSPITAL_NAME: 'I Hub',
            HOSPITAL_PHONE: '+243 974 336 700',
            HOSPITAL_EMAIL: 'jeremyodimba322@gmail.com',
            HOSPITAL_ADDRESS: '',
            HOSPITAL_LOGO_URL: 'logo.jpg',
            CURRENCY: 'Fc',
            ITEMS_PER_PAGE: 20,
            DEBUG: false
        };

        document.getElementById('appName').textContent = CONFIG.APP_NAME.split(' ')[0];

        // ==================== STORAGE ====================
        class SecureStorage {
            static set(key, value, persistent = false) {
                try {
                    const target = persistent ? localStorage : sessionStorage;
                    const secondary = persistent ? sessionStorage : localStorage;
                    target.setItem(key, JSON.stringify(value));
                    secondary.removeItem(key);
                } catch(e) { console.error('Storage error:', e); }
            }
            static get(key) {
                try {
                    const sessionItem = sessionStorage.getItem(key);
                    if (sessionItem !== null) return JSON.parse(sessionItem);
                    const localItem = localStorage.getItem(key);
                    return localItem ? JSON.parse(localItem) : null;
                } catch(e) { return null; }
            }
            static remove(key) {
                sessionStorage.removeItem(key);
                localStorage.removeItem(key);
            }
            static clear() {
                sessionStorage.clear();
                localStorage.clear();
            }
        }

        // ==================== API SERVICE ====================
        class APIService {
            constructor(baseURL) { this.baseURL = baseURL; }

            async request(endpoint, options = {}, retries = 1) {
                const token = SecureStorage.get('token');
                const headers = { ...options.headers };
                if (!(options.body instanceof FormData) && !headers['Content-Type']) {
                    headers['Content-Type'] = 'application/json';
                }
                if (token) headers['Authorization'] = `Bearer ${token}`;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);

                    const response = await fetch(`${this.baseURL}${endpoint}`, {
                        ...options,
                        headers,
                        credentials: 'include',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.status === 401) { this.logout(); throw new Error('Session expirée. Veuillez vous reconnecter.'); }
                    if (response.status === 403) throw new Error('Accès interdit. Permissions insuffisantes.');
                    if (response.status === 404) throw new Error('Ressource introuvable.');
                    if (response.status === 422) { const data = await response.json(); throw new Error(data.error || 'Données invalides.'); }
                    if (response.status === 429) throw new Error('Trop de requêtes. Veuillez patienter.');
                    if (response.status >= 500) {
                        if (retries > 0) {
                            await new Promise(r => setTimeout(r, 1000));
                            return this.request(endpoint, options, retries - 1);
                        }
                        throw new Error('Erreur serveur. Réessayez plus tard.');
                    }

                    const responseType = response.headers.get('content-type') || '';
                    let data = null;
                    if (response.status !== 204 && response.status !== 205) {
                        if (responseType.includes('application/json')) {
                            data = await response.json();
                        } else {
                            const text = await response.text();
                            data = text ? { message: text } : null;
                        }
                    }
                    if (!response.ok) throw new Error(data?.error || data?.message || 'Erreur inconnue');
                    return data;
                } catch(error) {
                    if (error.name === 'AbortError') throw new Error('Requête expirée. Vérifiez votre connexion.');
                    if (error.message === 'Failed to fetch') throw new Error('Serveur indisponible. Vérifiez que le backend est démarré.');
                    throw error;
                }
            }
            get(endpoint) { return this.request(endpoint, { method: 'GET' }); }
            post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); }
            put(endpoint, body) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(body) }); }
            patch(endpoint, body) { return this.request(endpoint, { method: 'PATCH', body: JSON.stringify(body) }); }
            delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); }
            logout() { SecureStorage.clear(); window.location.reload(); }
        }

        let api = null;

        // ==================== UI HELPERS ====================
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function sanitizeInput(input) {
            if (input === null || input === undefined) return '';
            return String(input)
                .replace(/[\u0000-\u001F\u007F]/g, ' ')
                .replace(/[<>`]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function normalizeEmail(value) {
            return sanitizeInput(value).toLowerCase();
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalizeEmail(value));
        }

        function assert(condition, message) {
            if (!condition) throw new Error(message);
        }

        function beginFormSubmission(form, pendingLabel = 'Traitement...') {
            if (!form) return true;
            if (form.dataset.submitting === 'true') return false;
            form.dataset.submitting = 'true';
            const submitButton = form.querySelector('button[type="submit"]');
            if (submitButton) {
                submitButton.dataset.originalLabel = submitButton.innerHTML;
                submitButton.disabled = true;
                submitButton.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${escapeHtml(pendingLabel)}`;
            }
            return true;
        }

        function endFormSubmission(form) {
            if (!form) return;
            delete form.dataset.submitting;
            const submitButton = form.querySelector('button[type="submit"]');
            if (submitButton) {
                submitButton.disabled = false;
                submitButton.innerHTML = submitButton.dataset.originalLabel || submitButton.innerHTML;
                delete submitButton.dataset.originalLabel;
            }
        }

        // ==================== REDIRECTION ====================
        function redirectToRoleDashboard(user) {
            const roleMap = {
                'super_admin': 'admin.html',
                'reception': 'reception.html',
                'infirmier': 'infirmier.html',
                'docteur': 'docteur.html',
                'laboratoire': 'laboratoire.html',
                'pharmacie': 'pharmacie.html'
            };
            const target = roleMap[user.role] || 'index.html';
            window.location.href = target;
        }

        function persistAuthPayload(data, rememberMe = false) {
            const token = data?.token || data?.access_token || data?.session?.access_token || null;
            const user = data?.user || data;
            if (token) {
                SecureStorage.set('token', token, rememberMe);
            } else {
                SecureStorage.remove('token');
            }
            SecureStorage.set('user', user, rememberMe);
            if (rememberMe) {
                SecureStorage.set('rememberMe', true, true);
            } else {
                SecureStorage.remove('rememberMe');
            }
            return user;
        }

        // ==================== AUTHENTICATION ====================
        async function handleLogin(event) {
            event.preventDefault();
            const form = event.currentTarget;
            if (!beginFormSubmission(form, 'Connexion...')) return;
            showLoading();

            try {
                const email = normalizeEmail(document.getElementById('loginEmail').value);
                const password = document.getElementById('loginPassword').value;
                const rememberMe = document.getElementById('rememberMe')?.checked || false;

                assert(isValidEmail(email), 'Veuillez saisir un email valide.');
                assert(password.trim().length >= 8, 'Le mot de passe doit contenir au moins 8 caractères.');

                const data = await api.post('/auth/login', {
                    email,
                    password,
                    remember_me: rememberMe
                });

                const user = persistAuthPayload(data, rememberMe);
                showToast('Connexion réussie !', 'success');
                redirectToRoleDashboard(user);

            } catch(error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
                endFormSubmission(form);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const form = event.currentTarget;
            if (!beginFormSubmission(form, 'Création...')) return;
            showLoading();

            const name = sanitizeInput(document.getElementById('registerName').value);
            const email = normalizeEmail(document.getElementById('registerEmail').value);
            const password = document.getElementById('registerPassword').value;
            const role = sanitizeInput(document.getElementById('registerRole').value);

            if (name.length < 2) { showToast('Nom trop court', 'error'); hideLoading(); endFormSubmission(form); return; }
            if (!isValidEmail(email)) { showToast('Email invalide', 'error'); hideLoading(); endFormSubmission(form); return; }
            if (password.length < 8) { showToast('Mot de passe trop court', 'error'); hideLoading(); endFormSubmission(form); return; }
            if (!['docteur', 'infirmier', 'laboratoire', 'pharmacie', 'reception'].includes(role)) {
                showToast('Rôle invalide', 'error');
                hideLoading();
                endFormSubmission(form);
                return;
            }

            try {
                const data = await api.post('/auth/register', { name, email, password, role });
                const user = persistAuthPayload(data, false);
                showToast('Inscription réussie !', 'success');
                redirectToRoleDashboard(user);
            } catch(error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
                endFormSubmission(form);
            }
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                buttons[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                buttons[1].classList.add('active');
            }
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            api = new APIService(CONFIG.API_URL);

            const token = SecureStorage.get('token');
            const savedUser = SecureStorage.get('user');

            if (token && savedUser) {
                redirectToRoleDashboard(savedUser);
            }

            // Exposer les fonctions globales
            window.switchTab = switchTab;
            window.handleLogin = handleLogin;
            window.handleRegister = handleRegister;
            window.showToast = showToast;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
