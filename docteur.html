<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Hub — Médecin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="logo.jpg">

    <style>
        /* ==================== CSS COMPLET DU FICHIER styles.css ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a5c7e;
            --primary-dark: #084c68;
            --primary-light: #1e7b9e;
            --primary-sky: #2c8eb5;
            --primary-gradient: linear-gradient(135deg, #0a5c7e 0%, #1e7b9e 100%);
            --secondary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --purple: #9b59b6;
            --dark: #1a2634;
            --darker: #0f1720;
            --light: #f8fafc;
            --gray: #e2e8f0;
            --gray-light: #f1f5f9;
            --gray-dark: #64748b;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--gray-light) 0%, #e9ecef 100%);
            color: var(--dark);
            min-height: 100vh;
            padding-left: 300px;
            overflow-x: hidden;
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--gray); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* ==================== TOAST ==================== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
        }

        .toast {
            background: white;
            border-radius: var(--radius);
            padding: 14px 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 320px;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            border-left: 4px solid;
            font-weight: 500;
        }

        .toast.success { border-left-color: var(--success); background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%); }
        .toast.error { border-left-color: var(--danger); background: linear-gradient(135deg, #fff 0%, #fef2f2 100%); }
        .toast.warning { border-left-color: var(--warning); background: linear-gradient(135deg, #fff 0%, #fffbeb 100%); }
        .toast.info { border-left-color: var(--info); background: linear-gradient(135deg, #fff 0%, #eff6ff 100%); }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        /* ==================== LOADING ==================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-gradient);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.6s ease;
        }

        .loading-logo {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            object-fit: contain;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .loading-pulse {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.97); }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.7);
            border-right: 1px solid rgba(255, 255, 255, 0.85);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            height: 100vh;
            overflow-y: auto;
            transition: var(--transition);
            box-shadow: var(--shadow-xl);
            z-index: 100;
            backdrop-filter: blur(18px);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(10,92,126,0.3); border-radius: 10px; }

        .sidebar-header {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            padding: 28px 24px 24px;
            border-bottom: 1px solid rgba(171, 201, 228, 0.3);
        }

        .sidebar-mark {
            flex: none;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(120, 205, 255, 0.95) 0%, rgba(77, 163, 255, 0.95) 100%);
            color: white;
            box-shadow: 0 16px 36px rgba(77, 163, 255, 0.2);
        }

        .sidebar-mark i {
            font-size: 24px;
        }

        .sidebar-header h2 {
            margin: 8px 0 10px;
            color: var(--darker);
            font-size: 22px;
            font-weight: 800;
        }

        .sidebar-header p {
            color: var(--gray-dark);
            font-size: 12px;
        }

        .sidebar-logo-img {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            object-fit: cover;
        }

        .nav-menu { padding: 12px 0; }

        .nav-item {
            padding: 14px 16px;
            margin: 5px 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #5b7fa3;
            cursor: pointer;
            transition: var(--transition);
            border-radius: var(--radius);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(241, 249, 255, 0.9);
            border-color: rgba(163, 210, 244, 0.6);
            color: var(--primary-dark);
            transform: translateX(0);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(120, 206, 255, 0.98) 0%, rgba(77, 163, 255, 0.98) 100%);
            color: white;
            box-shadow: 0 18px 36px rgba(77, 163, 255, 0.24);
        }

        .nav-item i { width: 22px; font-size: 18px; }

        .nav-section-label {
            padding: 20px 24px 10px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-footer {
            padding: 22px 24px 26px;
            border-top: 1px solid rgba(171, 201, 228, 0.3);
        }

        .sidebar-footer-card {
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(242, 248, 255, 0.8);
            color: var(--dark);
        }

        .sidebar-footer-card small {
            display: block;
            margin-top: 6px;
            color: var(--gray-dark);
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(93, 132, 172, 0.22);
            backdrop-filter: blur(6px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .mobile-menu-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--primary-dark);
            box-shadow: var(--shadow-md);
            z-index: 250;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.82);
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 32px;
            animation: fadeIn 0.4s ease;
            min-width: 0;
        }

        /* ==================== PAGE HEADER ==================== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--darker);
            letter-spacing: -0.02em;
        }

        .page-header h1 i {
            margin-right: 12px;
            color: var(--primary);
        }

        .page-header p {
            color: var(--gray-dark);
            font-size: 14px;
        }

        /* ==================== STATS ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.72);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.72);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .stat-header i {
            font-size: 36px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .stat-label {
            color: var(--gray-dark);
            font-size: 14px;
            font-weight: 500;
        }

        /* ==================== DASHBOARD CARDS ==================== */
        .dashboard-greeting-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            padding: 26px 30px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, #0759b8 0%, #0b77d8 100%);
            color: white;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
        }

        .dashboard-greeting-card::after {
            content: "";
            position: absolute;
            right: -58px;
            top: -80px;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
        }

        .dashboard-greeting-copy,
        .dashboard-time-card {
            position: relative;
            z-index: 1;
        }

        .dashboard-greeting-date {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
            text-transform: capitalize;
            color: rgba(255, 255, 255, 0.84);
        }

        .dashboard-greeting-copy h2 {
            font-size: 30px;
            line-height: 1.15;
            font-weight: 800;
            margin-bottom: 8px;
            color: white;
        }

        .dashboard-greeting-copy p {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.82);
        }

        .dashboard-time-card {
            min-width: 170px;
            padding: 18px 20px;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(8px);
        }

        .dashboard-time-card span,
        .dashboard-time-card small {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.74);
        }

        .dashboard-time-card strong {
            display: block;
            margin: 6px 0 2px;
            font-size: 28px;
            line-height: 1;
            color: white;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .dashboard-records-grid {
            grid-template-columns: minmax(0, 1fr);
            align-items: start;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.72);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.72);
        }

        .dashboard-card h3 {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }

        .dashboard-card h3 i {
            margin-right: 10px;
            color: var(--primary);
        }

        /* ==================== TABLE ==================== */
        .table-container {
            background: rgba(255, 255, 255, 0.72);
            border-radius: 22px;
            overflow-x: auto;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 12px;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray);
        }

        th {
            background: var(--gray-light);
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr {
            transition: var(--transition);
        }

        tr:hover {
            background: var(--gray-light);
        }

        /* ==================== BOUTONS ==================== */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 16px 36px rgba(77, 163, 255, 0.28);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(66, 145, 232, 0.34);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #219a52 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f28d9a 0%, #e55e6d 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-info {
            background: linear-gradient(135deg, var(--info) 0%, #2980b9 100%);
            color: white;
        }

        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #e67e22 100%);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--gray);
            color: var(--dark);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 12px;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ==================== BADGE ==================== */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.55);
        }

        .badge-success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
        }

        .badge-danger {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
        }

        .badge-warning {
            background: linear-gradient(135deg, #fed7aa 0%, #fde68a 100%);
            color: #92400e;
        }

        .badge-info {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
        }

        .badge-primary {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            color: #0369a1;
        }

        .badge-purple {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
            color: #5b21b6;
        }

        /* ==================== FORM ==================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(173, 204, 232, 0.7);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
            font-family: inherit;
            background: rgba(255, 255, 255, 0.82);
            color: var(--dark);
        }

        .form-control:focus {
            outline: none;
            border-color: rgba(77, 163, 255, 0.9);
            box-shadow: 0 0 0 5px rgba(77, 163, 255, 0.12);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 60px;
        }

        select.form-control {
            appearance: auto;
        }

        /* ==================== SEARCH BAR ==================== */
        .search-bar {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            position: relative;
            align-items: center;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            padding-left: 45px;
            border: 2px solid rgba(173, 204, 232, 0.7);
            border-radius: var(--radius);
            font-size: 14px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--dark);
            box-shadow: 0 10px 24px rgba(88, 143, 208, 0.08);
        }

        .search-bar input:focus {
            outline: none;
            border-color: rgba(77, 163, 255, 0.9);
            box-shadow: 0 0 0 5px rgba(77, 163, 255, 0.12);
        }

        .search-bar i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-dark);
        }

        /* ==================== FILTERS ROW ==================== */
        .filters-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filters-row .form-control {
            flex: 1;
            min-width: 150px;
        }

        /* ==================== EMPTY STATE ==================== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-dark);
        }

        .empty-state i {
            font-size: 48px;
            color: var(--gray);
            margin-bottom: 12px;
            display: block;
        }

        .empty-state h3 {
            color: var(--dark);
            margin-bottom: 6px;
        }

        .empty-state p {
            color: var(--gray-dark);
        }

        /* ==================== MODAL ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(171, 209, 242, 0.28);
            backdrop-filter: blur(4px);
            z-index: 15000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            width: min(100%, 760px);
            max-height: min(92vh, 860px);
            overflow-y: auto;
            padding: 32px;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--darker);
        }

        .modal-header h3 i {
            margin-right: 10px;
            color: var(--primary);
        }

        .close-modal {
            cursor: pointer;
            font-size: 28px;
            color: var(--gray-dark);
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* ==================== INSIGHT STRIP ==================== */
        .insight-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .insight-card {
            padding: 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(10, 92, 126, 0.12);
            box-shadow: var(--shadow-md);
        }

        .insight-card .label {
            font-size: 12px;
            color: var(--gray-dark);
            margin-bottom: 8px;

        // ==================== STORAGE ====================
        class SecureStorage {
            static set(key, value, persistent = false) {
                try {
                    const target = persistent ? localStorage : sessionStorage;
                    const secondary = persistent ? sessionStorage : localStorage;
                    target.setItem(key, JSON.stringify(value));
                    secondary.removeItem(key);
                } catch(e) { console.error('Storage error:', e); }
            }
            static get(key) {
                try {
                    const sessionItem = sessionStorage.getItem(key);
                    if (sessionItem !== null) return JSON.parse(sessionItem);
                    const localItem = localStorage.getItem(key);
                    return localItem ? JSON.parse(localItem) : null;
                } catch(e) { return null; }
            }
            static remove(key) {
                sessionStorage.removeItem(key);
                localStorage.removeItem(key);
            }
            static clear() {
                sessionStorage.clear();
                localStorage.clear();
            }
        }

        // ==================== API SERVICE ====================
        class APIService {
            constructor(baseURL) { this.baseURL = baseURL; }

            async request(endpoint, options = {}, retries = 1) {
                const token = SecureStorage.get('token');
                const headers = { ...options.headers };
                if (!(options.body instanceof FormData) && !headers['Content-Type']) {
                    headers['Content-Type'] = 'application/json';
                }
                if (token) headers['Authorization'] = `Bearer ${token}`;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);

                    const response = await fetch(`${this.baseURL}${endpoint}`, {
                        ...options,
                        headers,
                        credentials: 'include',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.status === 401) { this.logout(); throw new Error('Session expirée.'); }
                    if (response.status === 403) throw new Error('Accès interdit.');
                    if (response.status === 404) throw new Error('Ressource introuvable.');
                    if (response.status >= 500) {
                        if (retries > 0) {
                            await new Promise(r => setTimeout(r, 1000));
                            return this.request(endpoint, options, retries - 1);
                        }
                        throw new Error('Erreur serveur.');
                    }

                    const responseType = response.headers.get('content-type') || '';
                    let data = null;
                    if (response.status !== 204 && response.status !== 205) {
                        if (responseType.includes('application/json')) {
                            data = await response.json();
                        } else {
                            const text = await response.text();
                            data = text ? { message: text } : null;
                        }
                    }
                    if (!response.ok) throw new Error(data?.error || data?.message || 'Erreur inconnue');
                    return data;
                } catch(error) {
                    if (error.name === 'AbortError') throw new Error('Requête expirée.');
                    if (error.message === 'Failed to fetch') throw new Error('Serveur indisponible.');
                    throw error;
                }
            }
            get(endpoint) { return this.request(endpoint, { method: 'GET' }); }
            post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); }
            put(endpoint, body) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(body) }); }
            patch(endpoint, body) { return this.request(endpoint, { method: 'PATCH', body: JSON.stringify(body) }); }
            delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); }
            logout() { SecureStorage.clear(); window.location.href = 'index.html'; }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function sanitizeInput(input) {
            if (input === null || input === undefined) return '';
            return String(input).replace(/[<>`]/g, '').trim();
        }

        function safeText(value, fallback = '—') {
            return value === null || value === undefined || value === '' ? fallback : String(value);
        }

        function formatDate(value) {
            if (!value) return '—';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '—' : date.toLocaleDateString('fr-FR');
        }

        function formatDateTime(value) {
            if (!value) return '—';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '—' : date.toLocaleString('fr-FR');
        }

        function getGreetingMessage(date = new Date()) {
            const hour = date.getHours();
            if (hour < 12) return 'Bonjour';
            if (hour < 18) return 'Bon après-midi';
            return 'Bonsoir';
        }

        function formatShortTime(date = new Date()) {
            return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        function sortByDateDesc(items, key) {
            return [...(items || [])].sort((a, b) => {
                const left = new Date(a?.[key] || a?.created_at || 0).getTime();
                const right = new Date(b?.[key] || b?.created_at || 0).getTime();
                return right - left;
            });
        }

        function getPatientStatusLabel(status) {
            const labels = { active: 'Actif', admitted: 'Hospitalisé', discharged: 'Sorti' };
            return labels[status] || safeText(status, 'Actif');
        }

        function getPatientStatusBadgeClass(status) {
            if (status === 'admitted') return 'warning';
            if (status === 'discharged') return 'info';
            return 'success';
        }

        function getGenderLabel(gender) {
            const labels = { M: 'Masculin', F: 'Féminin' };
            return labels[gender] || safeText(gender, 'Non renseigné');
        }

        function getRoleLabel(role) {
            const roles = {
                'super_admin': 'Administrateur',
                'docteur': 'Médecin',
                'infirmier': 'Infirmière',
                'laboratoire': 'Laboratoire',
                'pharmacie': 'Pharmacie',
                'reception': 'Réception'
            };
            return roles[role] || role;
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.remove();
        }

        function closeSidebar() {
            document.getElementById('sidebar')?.classList.remove('mobile-open');
            document.getElementById('sidebarOverlay')?.classList.remove('active');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (!sidebar || !overlay) return;
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active', sidebar.classList.contains('mobile-open'));
        }

        function syncResponsiveChrome() {
            const menuButton = document.getElementById('mobileMenuBtn');
            if (!menuButton) return;
            menuButton.style.display = currentUser && window.innerWidth <= 1024 ? 'flex' : 'none';
            if (window.innerWidth > 1024) closeSidebar();
        }

        function getCurrentRole() {
            return currentUser?.role || '';
        }

        function isAdmin() {
            return getCurrentRole() === 'super_admin';
        }

        function canAccessPage(pageId) {
            if (isAdmin()) return true;
            return (ROLE_PAGE_ACCESS[getCurrentRole()] || []).includes(pageId);
        }

        function filterForCurrentDoctor(list) {
            if (getCurrentRole() !== 'docteur') return list;
            const myId = String(currentUser?.id || '');
            const myName = String(currentUser?.name || '').toLowerCase();
            return (Array.isArray(list) ? list : []).filter(item => {
                const idFields = ['assigned_doctor_id','doctor_id','practitioner_id','provider_id','prescriber_id','requested_by','created_by','user_id','assigned_to'];
                const nameFields = ['doctor_name','practitioner_name','provider_name','prescriber_name','created_by_name','user_name','assigned_doctor_name'];
                if (myId && idFields.some(f => String(item?.[f] || '') === myId)) return true;
                if (myName && nameFields.some(f => String(item?.[f] || '').toLowerCase() === myName)) return true;
                return false;
            });
        }

        function isOwnRecord(rec) {
            const myId = String(currentUser?.id || '');
            const myName = String(currentUser?.name || '').toLowerCase();
            if (!myId && !myName) return true;
            const idFields = ['assigned_doctor_id','doctor_id','practitioner_id','provider_id','prescriber_id','requested_by','created_by','user_id','assigned_to'];
            const nameFields = ['doctor_name','practitioner_name','provider_name','prescriber_name','created_by_name','user_name','assigned_doctor_name'];
            if (myId && idFields.some(f => String(rec?.[f] || '') === myId)) return true;
            if (myName && nameFields.some(f => String(rec?.[f] || '').toLowerCase() === myName)) return true;
            return false;
        }

        function filterAppointmentsForCurrentRole(appointments) {
            const list = Array.isArray(appointments) ? appointments : [];
            return list.filter(isOwnAppointment);
        }

        function isOwnAppointment(appointment) {
            if (getCurrentRole() !== 'docteur') return true;
            return isOwnRecord(appointment);
        }

        function fmtDate(d) {
            if (!d) return '—';
            try { return new Date(d).toLocaleString('fr-FR'); } catch { return d; }
        }

        function getPatientAgeYears(patient) {
            const rawDate = patient?.date_of_birth || patient?.birth_date || patient?.dob;
            if (!rawDate) return null;
            const birthDate = new Date(rawDate);
            if (Number.isNaN(birthDate.getTime())) return null;
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        function getTriageColor(vitals) {
            if (!vitals) return 'green';
            const temp = parseFloat(vitals.temperature);
            const hr = parseInt(vitals.heart_rate);
            const spo2 = parseFloat(vitals.oxygen_saturation);
            if ((temp && temp > 39) || (hr && hr > 120) || (spo2 && spo2 < 90)) return 'red';
            if ((temp && temp > 38.5) || (hr && hr > 100) || (spo2 && spo2 < 94)) return 'orange';
            return 'green';
        }

        function getTriageLabel(color) {
            const labels = { red: 'Urgent', orange: 'Modéré', green: 'Stable' };
            return labels[color] || 'Stable';
        }

        function statusBadge(s) {
            const statusMap = {
                waiting: { label: 'En attente', color: 'warning' },
                assigned: { label: 'Assigné', color: 'info' },
                in_consultation: { label: 'En consultation', color: 'primary' },
                completed: { label: 'Terminé', color: 'success' },
                hospitalized: { label: 'Hospitalisé', color: 'danger' },
                discharged: { label: 'Sorti', color: 'success' }
            };
            const info = statusMap[s] || { label: s || '—', color: 'secondary' };
            return `<span class="badge badge-${info.color}">${info.label}</span>`;
        }

        // ==================== ROLE ACCESS ====================
        const ROLE_PAGE_ACCESS = {
            super_admin: ['dashboard', 'waiting-room', 'consultation', 'prescription', 'patients', 'appointments', 'laboratory', 'care', 'reports', 'ai-assistant'],
            docteur: ['dashboard', 'waiting-room', 'consultation', 'prescription', 'patients', 'appointments', 'laboratory', 'care', 'reports', 'ai-assistant']
        };

        // ==================== BUILD TABLE SECTION ====================
        function buildTableSection(headers, rowsMarkup, emptyMessage) {
            if (!rowsMarkup || !rowsMarkup.length) {
                return `<div class="empty-state"><i class="fas fa-folder-open" style="font-size:20px;margin-bottom:8px;color:var(--primary);"></i><div>${emptyMessage}</div></div>`;
            }
            return `
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr>${headers.map(header => `<th>${header}</th>`).join('')}</tr></thead>
                        <tbody>${rowsMarkup.join('')}</tbody>
                    </table>
                </div>
            `;
        }

        // ==================== NAVIGATION ====================
        function buildNavigation() {
            const navMenu = document.getElementById('navMenu');
            const navItems = [
                { id: 'dashboard', icon: 'fa-tachometer-alt', label: 'Tableau de bord', roles: ['super_admin', 'docteur'] },
                { id: 'waiting-room', icon: 'fa-clock', label: 'Salle d\'attente', roles: ['super_admin', 'docteur'] },
                { id: 'consultation', icon: 'fa-stethoscope', label: 'Consultation', roles: ['super_admin', 'docteur'] },
                { id: 'prescription', icon: 'fa-prescription-bottle', label: 'Prescription', roles: ['super_admin', 'docteur'] },
                { id: 'patients', icon: 'fa-users', label: 'Patients', roles: ['super_admin', 'docteur'] },
                { id: 'appointments', icon: 'fa-calendar-alt', label: 'Rendez-vous', roles: ['super_admin', 'docteur'] },
                { id: 'laboratory', icon: 'fa-flask', label: 'Laboratoire', roles: ['super_admin', 'docteur'] },
                { id: 'care', icon: 'fa-heartbeat', label: 'Soins', roles: ['super_admin', 'docteur'] },
                { id: 'reports', icon: 'fa-chart-bar', label: 'Rapports', roles: ['super_admin', 'docteur'] },
                { id: 'ai-assistant', icon: 'fa-brain', label: 'IA médicale', roles: ['super_admin', 'docteur'] }
            ];

            const allowedItems = navItems.filter(item => item.roles.includes(currentUser.role));
            navMenu.innerHTML = allowedItems.map(item => {
                return `<div class="nav-item" data-page="${item.id}" onclick="loadPage('${item.id}', event)"><i class="fas ${item.icon}"></i><span>${item.label}</span></div>`;
            }).join('');
        }

        // ==================== PAGE LOADER ====================
        async function loadPage(pageId, event) {
            const mainContent = document.getElementById('mainContent');
            if (!canAccessPage(pageId)) {
                mainContent.innerHTML = `
                    <div class="empty-state" style="margin-top:40px;">
                        <i class="fas fa-user-lock" style="font-size:48px;color:var(--warning);margin-bottom:16px;"></i>
                        <h3 style="margin-bottom:10px;">Accès limité</h3>
                        <p>Cette section n'est pas disponible pour votre rôle actuel.</p>
                        <p style="margin-top:12px;"><span class="badge badge-info"><i class="fas fa-user-tag"></i> ${escapeHtml(getRoleLabel(currentUser?.role))}</span></p>
                    </div>
                `;
                return;
            }

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const activeItem = event?.target?.closest('.nav-item') || document.querySelector(`.nav-item[data-page="${pageId}"]`);
            activeItem?.classList.add('active');

            showLoading();
            try {
                switch (pageId) {
                    case 'dashboard': await loadDashboardStats(); break;
                    case 'waiting-room': await loadWaitingRoom(); break;
                    case 'consultation': await loadConsultation(); break;
                    case 'prescription': await loadPrescription(); break;
                    case 'patients': await loadPatients(); break;
                    case 'appointments': await loadAppointments(); break;
                    case 'laboratory': await loadLaboratory(); break;
                    case 'care': await loadCare(); break;
                    case 'reports': await loadReports(); break;
                    case 'ai-assistant': await loadAIAssistant(); break;
                    default: mainContent.innerHTML = `<div class="empty-state"><h3>Page en construction</h3></div>`;
                }
            } catch (error) {
                showToast(error.message, 'error');
                mainContent.innerHTML = `
                    <div class="empty-state" style="margin-top:40px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:40px;color:var(--warning);margin-bottom:10px;"></i>
                        <h3 style="margin-bottom:10px;">Erreur de chargement</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn btn-primary" onclick="loadPage('${pageId}')" style="margin-top:18px;"><i class="fas fa-sync-alt"></i> Réessayer</button>
                    </div>
                `;
            } finally {
                hideLoading();
                closeSidebar();
            }
        }

        // ==================== DASHBOARD ====================
        function loadDashboard() {
            const savedToken = SecureStorage.get('token');
            const savedUser = SecureStorage.get('user');
            if (savedToken && savedUser) currentUser = savedUser;
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userInfo').innerHTML = `<strong>${escapeHtml(currentUser.name)}</strong><br><small>${escapeHtml(getRoleLabel(currentUser.role))}</small>`;
            buildNavigation();
            syncResponsiveChrome();
            loadPage('dashboard');
        }

        // ==================== DASHBOARD STATS ====================
        async function loadDashboardStats() {
            const viewAppointments = canAccessPage('appointments');
            const viewCare = canAccessPage('care');

            const fetches = [
                api.get('/patients').catch(() => []),
                viewAppointments ? api.get('/appointments').catch(() => []) : Promise.resolve([]),
                viewCare ? api.get('/care').catch(() => []) : Promise.resolve([]),
                api.get('/workflow/queue').catch(() => [])
            ];

            const [patients, rawAppointments, careLogs, queue] = await Promise.all(fetches);
            const appointments = viewAppointments ? filterAppointmentsForCurrentRole(rawAppointments) : [];

            patientsCache = sortByDateDesc(patients, 'created_at');
            const todayCare = viewCare ? careLogs.filter(c => new Date(c.date).toDateString() === new Date().toDateString()).length : 0;
            const waitingCount = Array.isArray(queue) ? queue.filter(q => {
                const myId = String(currentUser?.id || '');
                const myName = String(currentUser?.name || '').toLowerCase();
                return String(q.assigned_doctor_id || q.doctor_id || '') === myId ||
                       (q.doctor_name || q.assigned_doctor_name || '').toLowerCase() === myName;
            }).length : 0;

            const stats = [
                { icon: 'fa-users', value: patients.length, label: 'Patients' },
                { icon: 'fa-clock', value: waitingCount, label: 'En attente' },
                { icon: 'fa-calendar-alt', value: appointments.length, label: 'Rendez-vous' },
                { icon: 'fa-heartbeat', value: todayCare, label: 'Soins aujourd\'hui' }
            ];

            const dashboardNow = new Date();
            const dashboardGreeting = getGreetingMessage(dashboardNow);
            const dashboardTime = formatShortTime(dashboardNow);
            const dashboardUserName = safeText(currentUser?.name, 'Utilisateur');

            document.getElementById('mainContent').innerHTML = `
                <div class="page-header">
                    <h1><i class="fas fa-tachometer-alt"></i> Tableau de bord</h1>
                    <div class="action-stack">
                        <span class="badge badge-info"><i class="far fa-calendar"></i> ${new Date().toLocaleDateString('fr-FR')}</span>
                    </div>
                </div>
                <section class="dashboard-greeting-card">
                    <div class="dashboard-greeting-copy">
                        <span class="dashboard-greeting-date"><i class="far fa-calendar"></i> ${dashboardNow.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}</span>
                        <h2>${dashboardGreeting}, ${escapeHtml(dashboardUserName)}</h2>
                        <p>Voici votre résumé d'activité en temps réel.</p>
                    </div>
                    <div class="dashboard-time-card">
                        <span>Heure actuelle</span>
                        <strong>${dashboardTime}</strong>
                        <small>${escapeHtml(getRoleLabel(currentUser?.role))}</small>
                    </div>
                </section>
                <div class="stats-grid">
                    ${stats.map(stat => `
                        <div class="stat-card">
                            <div class="stat-header"><i class="fas ${stat.icon}"></i></div>
                            <div class="stat-value">${stat.value}</div>
                            <div class="stat-label">${stat.label}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="dashboard-grid dashboard-records-grid">
                    <div class="dashboard-card">
                        <h3><i class="fas fa-user-injured"></i> Derniers patients</h3>
                        ${buildTableSection(
                            ['Nom', 'Téléphone', 'Statut', 'Date'],
                            sortByDateDesc(patients, 'created_at').slice(0, 6).map(patient => `
                                <tr>
                                    <td><strong>${escapeHtml(patient.full_name)}</strong></td>
                                    <td>${escapeHtml(safeText(patient.phone))}</td>
                                    <td><span class="badge badge-${getPatientStatusBadgeClass(patient.status)}">${escapeHtml(getPatientStatusLabel(patient.status))}</span></td>
                                    <td>${formatDate(patient.created_at)}</td>
                                </tr>
                            `),
                            'Aucun patient enregistré.'
                        )}
                    </div>
                    ${viewCare ? `<div class="dashboard-card">

                            sortByDateDesc(careLogs, 'date').slice(0, 6).map(c => `
                                <tr>
                                    <td><strong>${escapeHtml(c.patient_name)}</strong></td>

        // ==================== WAITING ROOM ====================
        async function loadWaitingRoom() {
            const main = document.getElementById('mainContent');
            if (!main) return;
            main.innerHTML = `
                <div class="page-header">
                    <div><h1><i class="fas fa-clock"></i> Salle d'attente</h1><p>Patients assignés en attente de consultation</p></div>
                </div>
                <div id="waitingRoomContainer"><div class="loading-spinner"></div></div>
            `;
            try {
                const [queue, vitals] = await Promise.all([
                    api.get('/workflow/queue').catch(() => []),
                    api.get('/workflow/vitals').catch(() => [])
                ]);
                waitingRoomData.queue = Array.isArray(queue) ? queue : (queue?.items || []);
                waitingRoomData.vitals = Array.isArray(vitals) ? vitals : (vitals?.items || []);

                const myId = String(currentUser?.id || '');
                const myName = String(currentUser?.name || '').toLowerCase();
                const filtered = waitingRoomData.queue.filter(q =>
                    String(q.assigned_doctor_id || q.doctor_id || '') === myId ||
                    (q.doctor_name || q.assigned_doctor_name || '').toLowerCase() === myName
                );
                waitingRoomData.queue = filtered;

                filtered.forEach(q => {
                    const pid = q.patient_id || q.id;
                    const vitalsData = waitingRoomData.vitals.find(v => String(v.patient_id || v.patient?.id) === String(pid));
                    waitingRoomData.patientVitals[pid] = vitalsData;
                });

                renderWaitingRoomTable();
            } catch (e) {
                showToast(e.message || 'Erreur', 'error');
                document.getElementById('waitingRoomContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erreur: ${escapeHtml(e.message)}</p></div>`;
            }
        }

        function renderWaitingRoomTable() {
            const c = document.getElementById('waitingRoomContainer');
            if (!c) return;
            if (!waitingRoomData.queue.length) {
                c.innerHTML = `<div class="empty-state"><i class="fas fa-clock"></i><p>Aucun patient en salle d'attente</p></div>`;
                return;
            }
            c.innerHTML = `
                <div class="filters-row">
                    <input class="form-control" id="waitingRoomSearch" placeholder="🔍 Rechercher patient..." oninput="filterWaitingRoom(this.value)">
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr>
                            <th>#</th><th>Patient</th><th>Heure arrivée</th>
                            <th>Signes vitaux</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr></thead>
                        <tbody id="waitingRoomTbody">
                            ${waitingRoomData.queue.map((q, i) => rowWaitingRoom(q, i)).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function rowWaitingRoom(q, i) {
            const pid = q.patient_id || q.id;
            const pname = q.patient_name || q.patient?.name || '—';
            const vitals = waitingRoomData.patientVitals[pid];
            const hasVitals = !!vitals;
            const triageColor = getTriageColor(vitals);
            const triageLabel = getTriageLabel(triageColor);

            let vitalsDisplay = '<span style="color:var(--gray-dark);">—</span>';
            if (hasVitals) {
                vitalsDisplay = `
                    <div style="display:flex;gap:4px;flex-wrap:wrap;font-size:11px;">
                        <span>🌡️ ${vitals.temperature || '—'}°C</span>
                        <span>💓 ${vitals.heart_rate || '—'}</span>
                        <span>🩸 ${vitals.blood_pressure || '—'}</span>
                        <span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:999px;background:${triageColor === 'red' ? '#fee2e2' : triageColor === 'orange' ? '#ffedd5' : '#dcfce7'};color:${triageColor === 'red' ? '#dc2626' : triageColor === 'orange' ? '#d97706' : '#16a34a'};">
                            <span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:${triageColor === 'red' ? '#dc2626' : triageColor === 'orange' ? '#d97706' : '#16a34a'};"></span>
                            ${triageLabel}
                        </span>
                    </div>
                `;
            }

            const isInConsultation = q.status === 'in_consultation';

            return `<tr>
                <td>${q.order ?? (i+1)}</td>
                <td><strong>${escapeHtml(pname)}</strong></td>
                <td>${fmtDate(q.arrived_at || q.created_at)}</td>
                <td>${vitalsDisplay}</td>
                <td>${statusBadge(q.status || 'waiting')}</td>
                <td>
                    <div class="action-stack" style="gap:4px;flex-wrap:wrap;">
                        ${!isInConsultation ? `
                            <button class="btn btn-sm btn-success" onclick="callPatient(${pid}, '${escapeHtml(pname)}')" ${hasVitals ? '' : 'disabled title="Signes vitaux obligatoires avant d\'appeler"'}><i class="fas fa-bell"></i> Appeler</button>
                        ` : `
                            <span style="font-size:12px;color:var(--success);"><i class="fas fa-check-circle"></i> En consultation</span>
                        `}
                        <button class="btn btn-sm btn-info" onclick="openPatientRecord(${pid})"><i class="fas fa-folder-open"></i> Dossier</button>
                    </div>
                </td>
            </tr>`;
        }

        function filterWaitingRoom(q) {
            const tbody = document.getElementById('waitingRoomTbody');
            if (!tbody) return;
            const term = (q || '').toLowerCase();
            const filtered = waitingRoomData.queue.filter(x => (x.patient_name || x.patient?.name || '').toLowerCase().includes(term));
            tbody.innerHTML = filtered.map((x, i) => rowWaitingRoom(x, i)).join('');
        }

        async function callPatient(patientId, patientName) {
            showLoading();
            try {
                await api.patch(`/workflow/queue/${patientId}`, { status: 'in_consultation' });
                showToast(`Patient ${escapeHtml(patientName)} appelé en consultation`, 'success');

                const patient = await api.get(`/patients/${patientId}`);
                const vitals = waitingRoomData.patientVitals[patientId];

                consultationState.patientId = patientId;
                consultationState.patient = patient;
                consultationState.vitals = vitals || null;
                consultationState.diagnostics = [];
                consultationState.medicaments = [];
                consultationState.examens = [];
                consultationState.actes = [];
                consultationState.symptoms = '';
                consultationState.observations = '';

                loadPage('consultation');
                loadWaitingRoom();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function openPatientRecord(patientId) {
            showLoading();
            try {
                const patient = await api.get(`/patients/${patientId}`);
                const vitals = waitingRoomData.patientVitals[patientId];
                consultationState.patientId = patientId;
                consultationState.patient = patient;

        function filterCIM10(value) {
            const results = document.getElementById('cim10Results');
            if (!results) return;
            if (!value || value.length < 2) {
                results.style.display = 'none';
                return;
            }
            const term = value.toLowerCase();
            const filtered = cim10Data.filter(d => 
                d.code.toLowerCase().includes(term) || 
                d.label.toLowerCase().includes(term)
            ).slice(0, 20);

            if (!filtered.length) {
                results.innerHTML = '<div style="padding:8px;color:var(--gray-dark);">Aucun résultat</div>';
            } else {
                results.innerHTML = filtered.map(d => `
                    <div style="padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--gray);display:flex;justify-content:space-between;" 
                         onclick="selectCIM10('${d.code}', '${d.label.replace(/'/g, "\\'")}')">
                        <span><strong>${d.code}</strong></span>
                        <span>${d.label}</span>
                    </div>
                `).join('');
            }
            results.style.display = 'block';
        }

        function selectCIM10(code, label) {
            if (!consultationState.diagnostics) consultationState.diagnostics = [];
            if (!consultationState.diagnostics.find(d => d.code === code)) {
                consultationState.diagnostics.push({ code, label });
            }
            document.getElementById('cim10Search').value = '';
            document.getElementById('cim10Results').style.display = 'none';
            renderSelectedDiagnostics();
        }

        function renderSelectedDiagnostics() {
            const container = document.getElementById('selectedDiagnostics');
            if (!container) return;
            if (!consultationState.diagnostics || !consultationState.diagnostics.length) {
                container.innerHTML = '<span style="color:var(--gray-dark);font-size:13px;">Aucun diagnostic ajouté</span>';
                return;
            }
            container.innerHTML = consultationState.diagnostics.map(d => `
                <span style="display:inline-flex;align-items:center;gap:4px;background:var(--primary-light);padding:4px 10px;border-radius:999px;font-size:12px;">
                    <strong>${d.code}</strong> - ${d.label}
                    <span style="cursor:pointer;color:var(--danger);" onclick="removeDiagnostic('${d.code}')">&times;</span>
                </span>
            `).join('');
        }

        function removeDiagnostic(code) {
            consultationState.diagnostics = consultationState.diagnostics.filter(d => d.code !== code);
            renderSelectedDiagnostics();
        }

        function addDiagnostic() {
            const input = document.getElementById('cim10Search');
            const value = input.value.trim();
            if (!value) return;
            const found = cim10Data.find(d => 
                d.code.toLowerCase() === value.toLowerCase() ||
                d.label.toLowerCase().includes(value.toLowerCase())
            );
            if (found) {
                selectCIM10(found.code, found.label);
            } else {
                showToast('Diagnostic non trouvé dans la liste CIM-10', 'warning');
            }
        }

        async function saveConsultation() {
            showLoading();
            try {
                const symptoms = sanitizeInput(document.getElementById('consultationSymptoms')?.value || '');
                const observations = sanitizeInput(document.getElementById('consultationObservations')?.value || '');
                consultationState.symptoms = symptoms;
                consultationState.observations = observations;

                await api.post('/workflow/consultations', {
                    patient_id: consultationState.patientId,
                    symptoms: symptoms,
                    observations: observations,
                    diagnostics: consultationState.diagnostics || [],
                    doctor_id: currentUser.id
                });

                showToast('Consultation sauvegardée', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

            saveConsultation();
            setTimeout(() => loadPage('prescription'), 500);
        }

        async function endConsultation() {
            if (!confirm('Terminer la consultation ? Le patient sera retiré de la file d\'attente.')) return;
            showLoading();
            try {
                await saveConsultation();
                await api.patch(`/workflow/queue/${consultationState.patientId}`, { status: 'completed' });
                showToast('Consultation terminée', 'success');
                consultationState.patient = null;
                consultationState.patientId = null;
                consultationState.vitals = null;
                consultationState.diagnostics = [];
                consultationState.medicaments = [];
                consultationState.examens = [];
                consultationState.actes = [];
                loadPage('waiting-room');

                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }

        function filterPatientSearch(value) {

            if (!container) return;

            const filtered = (window._patientSearchList || []).filter(p => 
                p.full_name.toLowerCase().includes(term) ||
                (p.phone || '').includes(term) ||
                String(p.id).includes(term)
            ).slice(0, 20);

            if (!filtered.length) {
                container.innerHTML = '<div style="padding:12px;color:var(--gray-dark);">Aucun patient trouvé</div>';

                </div>

                consultationState.observations = '';

                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }

            const select = document.getElementById('medicamentSelect');
            const dosage = document.getElementById('medicamentDosage').value.trim();
            const frequence = document.getElementById('medicamentFreq').value.trim();
            const duree = document.getElementById('medicamentDuree').value.trim();

            if (!select.value) return showToast('Sélectionnez un médicament', 'warning');

            const med = prescriptionState.medicamentList.find(m => m.id === parseInt(select.value));
            if (!med) return;

            prescriptionState.medicaments.push({
                id: med.id,
                name: med.name,
                dosage: dosage || med.dosage,
                frequence: frequence || '2x/jour',
                duree: duree || '7 jours'
            });

            document.getElementById('medicamentDosage').value = '';
            document.getElementById('medicamentFreq').value = '';
            document.getElementById('medicamentDuree').value = '';
            select.value = '';

            renderMedicaments();
            showToast(`💊 ${med.name} ajouté`, 'success');

        async function savePrescription() {
            const patientId = consultationState.patientId;
            if (!patientId) return showToast('Aucun patient sélectionné', 'warning');

            showLoading();
            try {
                for (const med of prescriptionState.medicaments) {
                    await api.post('/prescriptions', {
                        patient_id: patientId,
                        medication: med.name,
                        dosage: med.dosage,
                        frequency: med.frequence,
                        duration: med.duree,
                        status: 'active'
                    });
                }

                for (const ex of prescriptionState.examens) {
                    await api.post('/laboratory/tests', {
                        patient_id: patientId,
                        test_type: ex.name,
                        notes: ex.notes,
                        status: 'pending'
                    });
                }

                for (const act of prescriptionState.actes) {
                    await api.post('/care', {
                        patient_id: patientId,
                        care_type: act.name,
                        description: act.notes,
                        status: 'pending'
                    });
                }

                showToast('Prescription sauvegardée', 'success');
                prescriptionState.medicaments = [];
                prescriptionState.examens = [];
                prescriptionState.actes = [];
                renderMedicaments();
                renderExamens();
                renderActes();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function sendToLab() {
            const examens = prescriptionState.examens;
            if (!examens.length) return showToast('Aucun examen à envoyer', 'warning');

            if (!confirm(`Envoyer ${examens.length} examen(s) au laboratoire ?`)) return;

            showLoading();
            try {
                const patientId = consultationState.patientId;
                for (const ex of examens) {
                    await api.post('/laboratory/tests', {
                        patient_id: patientId,
                        test_type: ex.name,
                        notes: ex.notes + ' (Envoyé par le médecin)',
                        status: 'pending'
                    });
                }
                showToast(`✅ ${examens.length} examen(s) envoyé(s) au laboratoire`, 'success');
                prescriptionState.examens = [];
                renderExamens();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

                    .stat { border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; text-align: center; }
                    .stat .value { font-size: 28px; font-weight: 700; color: #0a5c7e; }
                    .stat .label { font-size: 12px; color: #64748b; }
                    @media print { body { padding: 20px; } }
                </style></head><body>
                <h1>Rapport ${CONFIG.APP_NAME}</h1>
                <p>Généré le ${new Date().toLocaleString('fr-FR')}</p>
                ${content.innerHTML}
                </body></html>
            `);
            printWindow.document.close();
            setTimeout(() => { printWindow.print(); }, 500);
        }

        // ==================== AI ASSISTANT ====================
        async function loadAIAssistant() {
            document.getElementById('mainContent').innerHTML = `
                <div class="page-header">
                    <h1><i class="fas fa-brain"></i> Assistance IA médicale</h1>
                </div>
                <div class="ai-grid">
                    <div class="ai-panel">
                        <h4 style="margin:0 0 8px;">Résumé patient</h4>
                        <select class="form-control" id="aiPatientId">
                            <option value="">Sélectionner un patient</option>
                            ${patientsCache.map(p => `<option value="${p.id}">${escapeHtml(p.full_name)}</option>`).join('')}
                        </select>
                        <button class="btn btn-primary" style="margin-top:8px;" onclick="summarizePatient()"><i class="fas fa-notes-medical"></i> Générer</button>
                    </div>
                    <div class="ai-panel">
                        <h4 style="margin:0 0 8px;">Aide à la décision</h4>
                        <textarea class="form-control" id="clinicalPrompt" rows="4" placeholder="Symptômes, constantes, contexte clinique..."></textarea>
                        <button class="btn btn-primary" style="margin-top:8px;" onclick="askClinicalDecision()"><i class="fas fa-stethoscope"></i> Analyser</button>
                    </div>
                </div>
                <div id="aiOutput"></div>
            `;
        }

        async function summarizePatient() {
            const patientId = document.getElementById('aiPatientId')?.value;
            if (!patientId) return showToast('Sélectionnez un patient', 'warning');
            showLoading();
            try {
                const result = await api.post('/ai/patient-summary', { patient_id: patientId });
                document.getElementById('aiOutput').innerHTML = `
                    <div class="ai-result">
                        <h4><i class="fas fa-brain"></i> Résumé IA</h4>
                        <pre>${escapeHtml(result.summary || result.message || 'Aucune réponse')}</pre>
                        <div class="ai-disclaimer">Assistant médical — validation clinique obligatoire</div>
                    </div>
                `;
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function askClinicalDecision() {
            const prompt = sanitizeInput(document.getElementById('clinicalPrompt')?.value || '');
            if (prompt.length < 10) return showToast('Décrivez le contexte clinique.', 'warning');
            showLoading();
            try {
                const result = await api.post('/ai/clinical-decision', { context: prompt });
                document.getElementById('aiOutput').innerHTML = `
                    <div class="ai-result">
                        <h4><i class="fas fa-brain"></i> Aide à la décision</h4>
                        <pre>${escapeHtml(result.analysis || result.message || 'Aucune réponse')}</pre>
                        <div class="ai-disclaimer">Assistant médical — validation clinique obligatoire</div>
                    </div>
                `;
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        // ==================== LOGOUT ====================
        async function logout() {
            try {
                await fetch(`${CONFIG.API_URL}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (error) {}
            SecureStorage.clear();
            currentUser = null;
            window.location.href = 'index.html';
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            api = new APIService(CONFIG.API_URL);

            const token = SecureStorage.get('token');
            const savedUser = SecureStorage.get('user');

            if (token && savedUser) {
                currentUser = savedUser;
                await loadCIM10Data();
                loadDashboard();
            } else {
                window.location.href = 'index.html';
            }

            // Exposer les fonctions globales
            window.toggleSidebar = toggleSidebar;
            window.closeSidebar = closeSidebar;
            window.closeModal = closeModal;
            window.logout = logout;
            window.loadPage = loadPage;
            window.showToast = showToast;
            window.showLoading = showLoading;
            window.hideLoading = hideLoading;
            window.formatDate = formatDate;
            window.escapeHtml = escapeHtml;
            window.buildTableSection = buildTableSection;

            window.loadWaitingRoom = loadWaitingRoom;
